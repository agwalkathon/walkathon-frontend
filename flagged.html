<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flagged Activities — Arcgate Walkathon 2026</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F5F5F5; color: #1A1A1A; min-height: 100vh; display: flex; flex-direction: column; }
    .site-header { background: #fff; border-bottom: 3px solid #E8622A; padding: 12px 28px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .site-header img { height: 40px; object-fit: contain; }
    .site-header nav { display: flex; gap: 4px; flex-wrap: wrap; }
    .site-header nav a { font-size: 13px; color: #555; text-decoration: none; padding: 6px 12px; border-radius: 6px; }
    .site-header nav a:hover { background: #f0f0f0; }
    .site-header nav a.active { background: #E8622A; color: white; }
    .page-bar { background: #1A1A1A; color: white; padding: 18px 28px; display: flex; justify-content: space-between; align-items: center; }
    .page-bar h1 { font-size: 20px; font-weight: 600; }
    .page-bar .back { color: rgba(255,255,255,0.5); text-decoration: none; font-size: 13px; }
    .content { flex: 1; padding: 24px 28px; max-width: 1400px; width: 100%; margin: 0 auto; }
    .tab-bar { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; align-items: center; }
    .tab-btn { padding: 8px 18px; border-radius: 8px; border: 1px solid #e8e8e8; font-size: 13px; font-weight: 500; cursor: pointer; background: white; color: #555; }
    .tab-btn.active { background: #1A1A1A; color: white; border-color: #1A1A1A; }
    .btn-recheck { margin-left: auto; padding: 8px 18px; border-radius: 8px; border: none; font-size: 13px; font-weight: 500; cursor: pointer; background: #E8622A; color: white; }
    .summary { border-radius: 10px; padding: 13px 18px; margin-bottom: 18px; font-size: 14px; }
    .summary.warn { background: #fff3e0; border: 1px solid #ffcc80; color: #e65100; }
    .summary.ok   { background: #e8f5e9; border: 1px solid #a5d6a7; color: #2e7d32; }
    .summary.info { background: #e3f2fd; border: 1px solid #90caf9; color: #1565c0; }
    .card { background: white; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); overflow: hidden; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 900px; }
    th { background: #fafafa; padding: 10px 14px; text-align: left; font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid #f0f0f0; white-space: nowrap; }
    td { padding: 10px 14px; font-size: 13px; border-bottom: 1px solid #f8f8f8; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    .badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 12px; font-weight: 500; }
    .badge-walk { background: #e8f5e9; color: #2e7d32; }
    .badge-run  { background: #e3f2fd; color: #1565c0; }
    .badge-ride { background: #fff3e0; color: #e65100; }
    .badge-hike { background: #f3e5f5; color: #6a1b9a; }
    .ath { color: #E8622A; text-decoration: none; font-weight: 500; }
    .btn { padding: 6px 10px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500; margin-right: 3px; margin-bottom: 3px; }
    .btn-green  { background: #e8f5e9; color: #2e7d32; }
    .btn-red    { background: #ffebee; color: #c62828; }
    .btn-blue   { background: #e3f2fd; color: #1565c0; }
    .btn-orange { background: #fff3e0; color: #e65100; }
    .flag-reason { font-size: 11px; color: #e53935; font-style: italic; max-width: 180px; display: block; line-height: 1.4; }
    .loading-row td { text-align: center; padding: 48px; color: #bbb; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner-inline { width: 14px; height: 14px; border: 2px solid #f0f0f0; border-top-color: #E8622A; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; vertical-align: middle; margin-right: 6px; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
    .modal-overlay.show { display: flex; }
    .modal { background: white; border-radius: 16px; padding: 32px; width: 100%; max-width: 460px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); margin: 20px; }
    .modal h3 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
    .modal .sub { font-size: 13px; color: #888; margin-bottom: 24px; }
    .modal label { display: block; font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; font-weight: 600; }
    .modal select, .modal input[type=number] { width: 100%; padding: 10px 12px; border: 1px solid #e8e8e8; border-radius: 8px; font-size: 14px; margin-bottom: 16px; background: #fafafa; }
    .modal select:focus, .modal input:focus { outline: none; border-color: #E8622A; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }
    .modal-actions button { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; }
    .btn-confirm { background: #E8622A; color: white; }
    .btn-cancel  { background: #f0f0f0; color: #555; }
    .dist-field { display: none; }
    .dist-field.show { display: block; }
    .site-footer { background: #1A1A1A; color: #666; text-align: center; padding: 16px 28px; font-size: 12px; margin-top: auto; }
    .site-footer a { color: #E8622A; text-decoration: none; margin: 0 8px; }
  </style>
</head>
<body>
<div class="site-header">
  <img src="aw_logo.jpg" alt="Arcgate Walkathon 2026">
  <nav>
    <a href="admin.html">Dashboard</a>
    <a href="activities.html">Activities</a>
    <a href="leaderboard.html">Leaderboard</a>
    <a href="flagged.html" class="active">Flagged</a>
    <a href="participants.html">Participants</a>
    <a href="#" onclick="logout();return false;">Sign out</a>
  </nav>
</div>
<div class="page-bar">
  <h1>🚩 Flagged Activities</h1>
  <a href="admin.html" class="back">← Dashboard</a>
</div>
<div class="content">
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-flagged" onclick="switchTab('flagged')">🚩 Flagged</button>
    <button class="tab-btn" id="tab-deleted" onclick="switchTab('deleted')">🗑️ Deleted</button>
    <button class="btn-recheck" onclick="recheckAll()">🔍 Re-run Auto-flag</button>
  </div>
  <div class="summary warn" id="summary">Loading...</div>
  <div class="card">
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Athlete</th><th>Activity</th><th>Type</th><th>Date & time</th>
          <th>Distance</th><th>Avg speed</th><th>Flag reason</th><th>Actions</th>
        </tr></thead>
        <tbody id="flagged-body"><tr class="loading-row"><td colspan="8">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Manual Flag Modal -->
<div class="modal-overlay" id="flag-modal">
  <div class="modal">
    <h3 id="modal-title">Flag Activity</h3>
    <p class="sub" id="modal-sub"></p>
    <label>Flag reason</label>
    <select id="flag-reason-select" onchange="checkDistField()">
      <option value="">— Select reason —</option>
      <option>Not Our Participant</option>
      <option>Less than 1 km</option>
      <option>Treadmill</option>
      <option>Workout</option>
      <option>Elapsed Time Issue</option>
      <option>Pace Issue (Bike/Cycle)</option>
      <option>Shared (no proof)</option>
      <option>Indoor Run/Walk</option>
      <option>More than 2 Activities</option>
      <option>Suspicious Activity</option>
      <option>Ride / Cycling</option>
      <option>Distance Cropped - GPS Glitch</option>
      <option>Distance Issue</option>
      <option>GPS Glitch</option>
    </select>
    <div class="dist-field" id="dist-field">
      <label>Corrected distance (meters)</label>
      <input type="number" id="corrected-distance" placeholder="e.g. 3500">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm" onclick="confirmFlag()">Confirm flag</button>
    </div>
  </div>
</div>

<div class="site-footer">
  © 2026 Arcgate Walkathon &nbsp;·&nbsp;
  <a href="privacy.html">Privacy Policy</a>
  <a href="terms.html">Terms of Service</a>
</div>
<script>
var SUPABASE_URL  = 'https://jhdgkncpkrttvemvwukc.supabase.co';
var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpoZGdrbmNwa3J0dHZlbXZ3dWtjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NzgyNjMsImV4cCI6MjA5NzI1NDI2M30.d7mvXOYDq5G4aqs1Mbc6HFNgTBlQk4B6ah0eahE_yZE';
var BACKEND_URL   = 'https://walkathon-backend-hv9j.onrender.com';
var HDR = { apikey: SUPABASE_ANON, Authorization: 'Bearer '+SUPABASE_ANON };
function authGuard() { var s=JSON.parse(sessionStorage.getItem('wk_admin')||'{}'); if(!s.loggedIn||s.expires<Date.now()) window.location.href='admin-login.html'; }
function logout() { sessionStorage.removeItem('wk_admin'); window.location.href='admin-login.html'; }
function fmtDate(d) { return new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}); }
function fmtTime(d) { return new Date(d).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true}); }
function bc(t) { if(t==='Walk') return 'badge-walk'; if(t==='Run'||t==='VirtualRun') return 'badge-run'; if(t==='Ride'||t==='VirtualRide'||t==='MountainBikeRide') return 'badge-ride'; return 'badge-hike'; }
authGuard();
var currentTab='flagged', regMap={}, currentId=null;
function switchTab(t){ currentTab=t; document.getElementById('tab-flagged').classList.toggle('active',t==='flagged'); document.getElementById('tab-deleted').classList.toggle('active',t==='deleted'); loadData(); }
function checkDistField(){ var v=document.getElementById('flag-reason-select').value; document.getElementById('dist-field').classList.toggle('show',v==='Distance Cropped - GPS Glitch'); }
function openFlagModal(id,name,reason){ currentId=id; document.getElementById('modal-sub').textContent='Activity by: '+name; document.getElementById('flag-reason-select').value=reason||''; document.getElementById('flag-modal').classList.add('show'); }
function closeModal(){ document.getElementById('flag-modal').classList.remove('show'); document.getElementById('flag-reason-select').value=''; document.getElementById('dist-field').classList.remove('show'); document.getElementById('corrected-distance').value=''; currentId=null; }
async function confirmFlag(){
  var reason=document.getElementById('flag-reason-select').value;
  if(!reason){alert('Please select a reason');return;}
  var dist=document.getElementById('corrected-distance').value;
  var payload={activity_id:currentId,action:'flag',flag_reason:reason};
  if(reason==='Distance Cropped - GPS Glitch'&&dist){ payload.action='update_distance'; payload.distance_meters=parseFloat(dist); }
  await fetch(BACKEND_URL+'/flag',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  closeModal(); loadData();
}
async function doAction(id,action,reason){
  await fetch(BACKEND_URL+'/flag',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({activity_id:id,action:action,flag_reason:reason})});
  var row=document.getElementById('row-'+id); if(row) row.remove();
}
async function recheckAll(){
  if(!confirm('Re-run auto-flag on all activities?')) return;
  var btn=document.querySelector('.btn-recheck');
  btn.innerHTML='<span class="spinner-inline"></span>Running...'; btn.disabled=true;
  await fetch(BACKEND_URL+'/recheck-flags',{method:'POST',headers:{'Content-Type':'application/json'}});
  setTimeout(function(){ btn.innerHTML='🔍 Re-run Auto-flag'; btn.disabled=false; loadData(); },6000);
}
async function loadData(){
  document.getElementById('flagged-body').innerHTML='<tr class="loading-row"><td colspan="8">Loading...</td></tr>';
  var rR=await fetch(SUPABASE_URL+'/rest/v1/registration?select=strava_athlete_id,full_name',{headers:HDR});
  (await rR.json()).forEach(function(r){ regMap[r.strava_athlete_id]=r.full_name; });
  var url=currentTab==='flagged'
    ?SUPABASE_URL+'/rest/v1/activities?is_flagged=eq.true&is_deleted=eq.false&order=activity_date.desc'
    :SUPABASE_URL+'/rest/v1/activities?is_deleted=eq.true&order=activity_date.desc';
  var acts=await (await fetch(url,{headers:HDR})).json();
  var sum=document.getElementById('summary');
  if(currentTab==='flagged'){ sum.className=acts.length?'summary warn':'summary ok'; sum.textContent=acts.length?'⚠️ '+acts.length+' activit'+(acts.length===1?'y':'ies')+' flagged for review':'✅ No flagged activities — everything looks clean!'; }
  else { sum.className='summary info'; sum.textContent='🗑️ '+acts.length+' deleted activit'+(acts.length===1?'y':'ies')+'— can be restored anytime'; }
  if(!acts.length){ document.getElementById('flagged-body').innerHTML='<tr class="loading-row"><td colspan="8">'+(currentTab==='flagged'?'🎉 No flagged activities!':'No deleted activities')+'</td></tr>'; return; }
  document.getElementById('flagged-body').innerHTML=acts.map(function(a){
    var name=regMap[a.strava_athlete_id]||'Unknown';
    var safeReason=(a.flag_reason||'').replace(/'/g,"\\'");
    var actions=currentTab==='flagged'
      ?'<button class="btn btn-orange" onclick="openFlagModal('+a.id+',\''+name+'\',\''+safeReason+'\')">✏️ Edit</button>'
       +'<button class="btn btn-green" onclick="doAction('+a.id+',\'unflag\',\'\')">✅ Clear</button>'
       +'<button class="btn btn-red" onclick="doAction('+a.id+',\'delete\',\''+safeReason+'\')">🗑️ Delete</button>'
      :'<button class="btn btn-blue" onclick="doAction('+a.id+',\'restore\',\'\')">↩️ Restore</button>';
    return '<tr id="row-'+a.id+'">'
      +'<td><a href="https://www.strava.com/athletes/'+a.strava_athlete_id+'" target="_blank" class="ath">'+name+'</a></td>'
      +'<td><a href="https://www.strava.com/activities/'+a.strava_activity_id+'" target="_blank" class="act-link">'+(a.activity_name||'—')+'</a></td>'
      +'<td><span class="badge '+bc(a.sport_type)+'">'+(a.sport_type||'—')+'</span></td>'
      +'<td>'+fmtDate(a.activity_date)+' '+fmtTime(a.activity_date)+'</td>'
      +'<td>'+(a.distance_meters?(a.distance_meters/1000).toFixed(2)+' km':'—')+'</td>'
      +'<td>'+(a.avg_speed?(a.avg_speed*3.6).toFixed(1)+' km/h':'—')+'</td>'
      +'<td><span class="flag-reason">'+(a.flag_reason||'—')+'</span></td>'
      +'<td>'+actions+'</td>'
      +'</tr>';
  }).join('');
}
document.getElementById('flag-modal').addEventListener('click',function(e){ if(e.target===this) closeModal(); });
loadData();
</script>
</body>
</html>
