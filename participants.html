<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Walkathon 2026 — Participants</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f4f8; }
    .header { background: #1a1a2e; color: white; padding: 16px 28px; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 20px; font-weight: 500; }
    .back-btn { color: white; text-decoration: none; font-size: 13px; opacity: 0.7; }
    .back-btn:hover { opacity: 1; }
    .toolbar { background: white; border-bottom: 1px solid #eee; padding: 12px 28px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .search-box { padding: 8px 14px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px; width: 240px; }
    .search-box:focus { outline: none; border-color: #FC4C02; }
    .filter-select { padding: 8px 12px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px; }
    .filter-select:focus { outline: none; border-color: #FC4C02; }
    .count { font-size: 13px; color: #999; margin-left: auto; }
    .content { padding: 24px 28px; }
    .stats { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .stat-card { background: white; border-radius: 12px; padding: 14px 20px; flex: 1; min-width: 130px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .stat-card .value { font-size: 22px; font-weight: 600; color: #FC4C02; }
    .stat-card .label { font-size: 12px; color: #888; margin-top: 4px; }
    .table-wrap { background: white; border-radius: 14px; overflow-x: auto; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    table { width: 100%; border-collapse: collapse; min-width: 900px; }
    th { background: #f8f8f8; padding: 11px 14px; text-align: left; font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.4px; border-bottom: 1px solid #eee; white-space: nowrap; }
    td { padding: 11px 14px; font-size: 13px; border-bottom: 1px solid #f5f5f5; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }
    .athlete-link { color: #FC4C02; text-decoration: none; font-weight: 500; }
    .athlete-link:hover { text-decoration: underline; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; }
    .badge-active   { background: #e8f5e9; color: #2e7d32; }
    .badge-inactive { background: #f5f5f5; color: #999; }
    .badge-connected    { background: #e3f2fd; color: #1565c0; }
    .badge-notconnected { background: #fff3e0; color: #e65100; }
    .loading { text-align: center; padding: 48px; color: #bbb; }
    .team-tag { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; background: #f0f4f8; color: #555; }
  </style>
</head>
<body>

<div class="header">
  <h1>👥 Participants</h1>
  <a href="admin.html" class="back-btn">← Back to dashboard</a>
</div>

<div class="toolbar">
  <input class="search-box" type="text" id="search"
    placeholder="Search name, email or team..." oninput="filterTable()">
  <select class="filter-select" id="team-filter" onchange="filterTable()">
    <option value="">All teams</option>
    <option value="Team Seattle">Team Seattle</option>
    <option value="Team San Francisco">Team San Francisco</option>
    <option value="Team Los Angeles">Team Los Angeles</option>
    <option value="Team Chicago">Team Chicago</option>
    <option value="Team Austin">Team Austin</option>
    <option value="Team New York">Team New York</option>
  </select>
  <select class="filter-select" id="shift-filter" onchange="filterTable()">
    <option value="">All shifts</option>
    <option value="Dayshift">Dayshift</option>
    <option value="Nightshift">Nightshift</option>
  </select>
  <select class="filter-select" id="status-filter" onchange="filterTable()">
    <option value="">All statuses</option>
    <option value="active">Has activities</option>
    <option value="inactive">No activities yet</option>
    <option value="connected">Strava connected</option>
    <option value="notconnected">Not connected</option>
  </select>
  <span class="count" id="count"></span>
</div>

<div class="content">
  <div class="stats">
    <div class="stat-card"><div class="value" id="s-total">—</div><div class="label">Total registered</div></div>
    <div class="stat-card"><div class="value" id="s-connected">—</div><div class="label">Strava connected</div></div>
    <div class="stat-card"><div class="value" id="s-active">—</div><div class="label">Have activities</div></div>
    <div class="stat-card"><div class="value" id="s-total-km">—</div><div class="label">Total km</div></div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Team</th>
          <th>Shift</th>
          <th>Gender</th>
          <th>T-shirt</th>
          <th>Project lead</th>
          <th>Strava</th>
          <th>Activities</th>
          <th>Total km</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="participants-body">
        <tr><td colspan="11" class="loading">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  // ── Auth guard ───────────────────────────────────────────────
  const session = JSON.parse(sessionStorage.getItem('wk_admin') || '{}');
  if (!session.loggedIn || session.expires < Date.now()) {
    window.location.href = 'admin-login.html';
  }

  const SUPABASE_URL  = 'https://jhdgkncpkrttvemvwukc.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpoZGdrbmNwa3J0dHZlbXZ3dWtjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NzgyNjMsImV4cCI6MjA5NzI1NDI2M30.d7mvXOYDq5G4aqs1Mbc6HFNgTBlQk4B6ah0eahE_yZE';
  const HEADERS = { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` };

  let allRows = [];

  function filterTable() {
    const q      = document.getElementById('search').value.toLowerCase();
    const team   = document.getElementById('team-filter').value;
    const shift  = document.getElementById('shift-filter').value;
    const status = document.getElementById('status-filter').value;

    const filtered = allRows.filter(r => {
      const matchQ     = !q || r.full_name?.toLowerCase().includes(q) ||
                         r.email?.toLowerCase().includes(q) ||
                         r.leaderboard_team?.toLowerCase().includes(q);
      const matchTeam  = !team  || r.leaderboard_team === team;
      const matchShift = !shift || r.shift === shift;
      const matchStatus =
        !status ? true :
        status === 'active'       ? r.activity_count > 0 :
        status === 'inactive'     ? r.activity_count === 0 :
        status === 'connected'    ? r.is_connected :
        status === 'notconnected' ? !r.is_connected : true;
      return matchQ && matchTeam && matchShift && matchStatus;
    });

    document.getElementById('count').textContent =
      `${filtered.length} of ${allRows.length} participants`;
    renderRows(filtered);
  }

  function renderRows(rows) {
    document.getElementById('participants-body').innerHTML = rows.length
      ? rows.map((p, i) => `
        <tr>
          <td>${i + 1}</td>
          <td>
            <a href="${p.strava_profile_url || `https://www.strava.com/athletes/${p.strava_athlete_id}`}"
               target="_blank" class="athlete-link">
              ${p.full_name || '—'}
            </a>
          </td>
          <td><span class="team-tag">${p.leaderboard_team || '—'}</span></td>
          <td>${p.shift || '—'}</td>
          <td>${p.gender || '—'}</td>
          <td>${p.tshirt_size || '—'}</td>
          <td style="font-size:12px;color:#666">${p.project_lead || '—'}</td>
          <td>
            ${p.is_connected
              ? `<span class="badge badge-connected">✅ Connected</span>`
              : `<span class="badge badge-notconnected">⚠️ Not yet</span>`}
          </td>
          <td>${p.activity_count || 0}</td>
          <td>${p.total_distance ? (p.total_distance/1000).toFixed(1)+' km' : '—'}</td>
          <td>
            <span class="badge ${p.activity_count > 0 ? 'badge-active' : 'badge-inactive'}">
              ${p.activity_count > 0 ? '🏃 Active' : 'Pending'}
            </span>
          </td>
        </tr>`).join('')
      : '<tr><td colspan="11" class="loading">No participants match your filters</td></tr>';
  }

  async function loadParticipants() {
    const [regRes, partRes, actRes] = await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/registration?order=full_name.asc`, { headers: HEADERS }),
      fetch(`${SUPABASE_URL}/rest/v1/participants?select=strava_athlete_id`, { headers: HEADERS }),
      fetch(`${SUPABASE_URL}/rest/v1/activities?select=strava_athlete_id,distance_meters&is_deleted=eq.false`, { headers: HEADERS })
    ]);

    const registrations = await regRes.json();
    const connected     = await partRes.json();
    const activities    = await actRes.json();

    // Sets for quick lookup
    const connectedSet = new Set(connected.map(p => p.strava_athlete_id));

    // Activity stats per athlete
    const actMap = {};
    activities.forEach(a => {
      if (!actMap[a.strava_athlete_id]) actMap[a.strava_athlete_id] = { count: 0, distance: 0 };
      actMap[a.strava_athlete_id].count++;
      actMap[a.strava_athlete_id].distance += a.distance_meters || 0;
    });

    allRows = registrations.map(r => ({
      ...r,
      is_connected:   connectedSet.has(r.strava_athlete_id),
      activity_count: actMap[r.strava_athlete_id]?.count    || 0,
      total_distance: actMap[r.strava_athlete_id]?.distance || 0
    }));

    // Stats
    const connected_count = allRows.filter(r => r.is_connected).length;
    const active_count    = allRows.filter(r => r.activity_count > 0).length;
    const total_km        = allRows.reduce((s,r) => s + r.total_distance, 0) / 1000;

    document.getElementById('s-total').textContent     = allRows.length;
    document.getElementById('s-connected').textContent = connected_count;
    document.getElementById('s-active').textContent    = active_count;
    document.getElementById('s-total-km').textContent  = total_km.toFixed(1) + ' km';
    document.getElementById('count').textContent       = `${allRows.length} participants`;

    renderRows(allRows);
  }

  loadParticipants();
</script>
</body>
</html>
