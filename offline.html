<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — Arcgate Walkathon 2026</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f1117;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
    }
    .logo { width: 72px; height: 72px; margin-bottom: 24px; opacity: 0.9; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; color: #f8fafc; }
    p { font-size: 0.95rem; color: #94a3b8; line-height: 1.6; max-width: 280px; }
    .badge {
      margin-top: 32px;
      background: #1e2130;
      border: 1px solid #2d3348;
      border-radius: 12px;
      padding: 16px 24px;
      font-size: 0.85rem;
      color: #64748b;
    }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #ef4444; margin-right: 6px; }
    .retry-btn {
      margin-top: 28px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px 32px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>
  <img src="/agwalk/logo-icon.png" class="logo" alt="Arcgate Walkathon">
  <h1>You are offline</h1>
  <p>No internet connection. Your cached data is shown below when you return to the app.</p>
  <div class="badge">
    <span class="dot"></span>No connection detected
  </div>
  <button class="retry-btn" onclick="window.location.reload()">Try Again</button>
</body>
</html>
