<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0A0C10">
  <title>Leaderboard — Arcgate Walkathon 2026</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    :root{
      --brand:#E8622A; --brand-dim:rgba(232,98,42,0.15);
      --bg:#0A0C10; --surface:#181C28; --surface2:#22273A;
      --border:rgba(255,255,255,0.10);
      --text:#FFFFFF; --muted:rgba(255,255,255,0.52); --label:rgba(255,255,255,0.35); --dim:rgba(255,255,255,0.20);
      --gold:#F59E0B; --silver:#94A3B8; --bronze:#CD7F32; --green:#22C55E;
      --blue:#60A5FA;
      --radius:16px; --radius-sm:12px;
      --font:'Inter',-apple-system,sans-serif;
    }
    html,body{height:100%;}
    body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;flex-direction:column;min-height:100dvh;-webkit-font-smoothing:antialiased;}

    /* ── Header ── */
    .header{
      position:sticky;top:0;z-index:200;
      background:var(--surface);border-bottom:1px solid var(--border);
      padding:max(14px,env(safe-area-inset-top)) 16px 14px;
      display:grid;grid-template-columns:44px 1fr 44px;align-items:center;
    }
    .hdr-left,.hdr-right{display:flex;align-items:center;}
    .hdr-right{justify-content:flex-end;}
    .hdr-center{text-align:center;}
    .hdr-logo-img{height:34px;width:auto;}
    .icon-btn{background:none;border:none;cursor:pointer;padding:8px;border-radius:9px;color:var(--muted);display:flex;align-items:center;transition:color 0.15s;}
    .icon-btn:active{color:#fff;}
    .icon-btn svg{width:20px;height:20px;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .spinning{animation:spin 1s linear infinite;}

    /* ── My banner ── */
    .my-banner{
      background:var(--surface);
      border-bottom:1px solid var(--border);
      padding:12px 16px 14px;
      display:flex;align-items:center;gap:12px;
    }
    .my-info{flex:1;min-width:0;text-align:center;}
    .my-name{font-size:16px;font-weight:800;color:#fff;text-transform:uppercase;text-align:center;}
    .my-tags{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap;justify-content:center;}
    .my-tag{background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.95);font-size:8.5px;font-weight:600;padding:3px 8px;border-radius:20px;}
    .my-pts-block,.my-rank-block{text-align:center;flex-shrink:0;min-width:52px;}
    .my-pts-num,.my-rank-num{font-size:26px;font-weight:600;color:#fff;line-height:1;letter-spacing:-0.3px;}
    .my-pts-lbl,.my-rank-lbl{font-size:9px;text-transform:uppercase;letter-spacing:0.6px;color:var(--label);margin-top:3px;font-weight:600;}

    /* ── Tabs ── */
    .lb-tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);}
    .lb-tab{
      flex:1;padding:13px 8px 11px;
      font-size:12px;font-weight:700;color:var(--label);
      background:none;border:none;border-bottom:2.5px solid transparent;
      cursor:pointer;font-family:var(--font);transition:all 0.15s;
    }
    .lb-tab.active{color:var(--brand);border-bottom-color:var(--brand);}

    /* ── Legend ── */
    .lb-legend{display:flex;gap:12px;padding:8px 16px 7px;font-size:9.5px;color:var(--label);font-weight:600;flex-wrap:wrap;background:var(--surface);border-bottom:1px solid var(--border);}
    .lb-legend span{display:flex;align-items:center;gap:3px;}

    /* ── Content ── */
    .content{flex:1;padding:10px 12px 90px;max-width:600px;width:100%;margin:0 auto;}

    /* ── Leaderboard row ── */
    .lb-row{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:var(--radius-sm);
      padding:11px 12px;
      margin-bottom:6px;
      display:flex;align-items:center;gap:10px;
    }
    /* podium left accent */
    .lb-row.rank-1{border-left:3px solid var(--gold);border-radius:0 var(--radius-sm) var(--radius-sm) 0;}
    .lb-row.rank-2{border-left:3px solid var(--silver);border-radius:0 var(--radius-sm) var(--radius-sm) 0;}
    .lb-row.rank-3{border-left:3px solid var(--bronze);border-radius:0 var(--radius-sm) var(--radius-sm) 0;}
    /* my row */
    .lb-row.is-me{border:1.5px solid var(--brand);background:rgba(232,98,42,0.05);}
    .lb-row.is-me.rank-1,.lb-row.is-me.rank-2,.lb-row.is-me.rank-3{border:1.5px solid var(--brand);border-left:1.5px solid var(--brand);border-radius:var(--radius-sm);}

    /* rank col — big number */
    .rank-col{font-size:22px;font-weight:600;line-height:1;min-width:36px;flex-shrink:0;text-align:center;}
    .rank-col.r1{color:var(--gold);}
    .rank-col.r2{color:var(--silver);}
    .rank-col.r3{color:var(--bronze);}
    .rank-col.rn{font-size:14px;color:var(--muted);}

    /* row body */
    .row-body{flex:1;min-width:0;overflow:hidden;display:flex;align-items:center;justify-content:space-between;gap:8px;}
    .row-left{flex:1;min-width:0;}
    .row-name{font-size:13.5px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;}
    .row-tag-row{display:flex;gap:4px;margin-top:4px;flex-wrap:nowrap;overflow:hidden;}
    .row-right{flex-shrink:0;text-align:right;}
    .row-pts{display:flex;align-items:baseline;gap:2px;justify-content:flex-end;}
    .row-medal{font-size:14px;}
    .row-pts-num{font-size:18px;font-weight:600;color:var(--brand);}
    .row-pts-unit{font-size:9.5px;color:var(--label);font-weight:500;}
    .row-pills{display:flex;gap:3px;margin-top:5px;justify-content:flex-end;flex-wrap:nowrap;}
    .you-chip{display:inline-block;background:var(--brand);color:#fff;font-size:7.5px;font-weight:800;padding:1px 5px;border-radius:4px;margin-left:5px;vertical-align:middle;}
    .rpill{font-size:9px;font-weight:700;padding:2.5px 7px;border-radius:6px;white-space:nowrap;}
    .rpill.km{background:rgba(96,165,250,0.12);color:var(--blue);}
    .rpill.dist{background:rgba(96,165,250,0.07);color:rgba(96,165,250,0.7);}
    .rpill.bon{background:rgba(245,158,11,0.12);color:var(--gold);}
    .rpill.chal{background:rgba(34,197,94,0.12);color:var(--green);}
    .rpill.team{background:rgba(255,255,255,0.13);color:var(--muted);}

    /* skeleton */
    @keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
    .skeleton{background:linear-gradient(90deg,#1C2030 25%,#252A3A 50%,#1C2030 75%);background-size:800px 100%;animation:shimmer 1.6s ease infinite;border-radius:8px;}
    .skel-row{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:6px;}
    .skel-c{width:36px;height:36px;border-radius:50%;flex-shrink:0;}
    .skel-lines{flex:1;}
    .skel-l{height:11px;margin-bottom:6px;} .skel-l.m{width:60%;} .skel-l.s{width:40%;margin-bottom:0;}

    .empty-box{text-align:center;padding:48px 20px;color:var(--muted);}
    .empty-box .ei{font-size:36px;display:block;margin-bottom:12px;opacity:0.3;}
    .empty-box p{font-size:13px;line-height:1.6;}

    /* ── Bottom nav ── */
    .bottom-nav{
      position:fixed;bottom:0;left:0;right:0;
      background:var(--surface);border-top:1px solid var(--border);
      display:grid;grid-template-columns:1fr 1fr 1fr;
      padding-bottom:max(14px,env(safe-area-inset-bottom));
      z-index:200;
    }
    .bnav-a{
      display:flex;flex-direction:column;align-items:center;
      padding:12px 6px 4px;text-decoration:none;
      color:var(--label);font-size:9.5px;font-weight:700;
      letter-spacing:0.5px;text-transform:uppercase;gap:5px;
      transition:color 0.15s;position:relative;
    }
    .bnav-a svg{width:22px;height:22px;stroke-width:2;}
    .bnav-a.active{color:var(--brand);}
    .bnav-a.active::after{content:'';position:absolute;bottom:calc(max(14px,env(safe-area-inset-bottom)) + 100% - 4px);left:50%;transform:translateX(-50%);width:24px;height:3px;background:var(--brand);border-radius:0 0 3px 3px;}

    .points,.distance,.rank,td,th{font-variant-numeric:tabular-nums;}

    .points,.distance,.rank,td,th{font-variant-numeric:tabular-nums;}
  </style>
</head>

<script>
var SB='https://jhdgkncpkrttvemvwukc.supabase.co';
var ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpoZGdrbmNwa3J0dHZlbXZ3dWtjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NzgyNjMsImV4cCI6MjA5NzI1NDI2M30.d7mvXOYDq5G4aqs1Mbc6HFNgTBlQk4B6ah0eahE_yZE';
var HDR={apikey:ANON,Authorization:'Bearer '+ANON};
var ME=null,REG=[],ACTS=[],currentTab='shift';
var bronzeThresh=100,silverThresh=150,goldThresh=200;

function logout(){sessionStorage.removeItem('wk_user');sessionStorage.removeItem('wk_admin');window.location.href='index.html';}
function esc(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function norm(s){return String(s||'').trim().toLowerCase();}

var CONFIG={basePer_km:1,bonus:[{km:5,points:1},{km:8,points:2},{km:10,points:3},{km:15,points:4},{km:21,points:7}]};
var CHALLENGES=[],SPECIAL_DAYS=[];

function calcBonus(km) {
  var result = 0;
  var sorted = CONFIG.bonus.slice().sort(function(a,b){ return b.km - a.km; });
  for (var i = 0; i < sorted.length; i++) {
    if (km >= Number(sorted[i].km)) {
      result = Number(sorted[i].points || sorted[i].pts || 0);
      break;
    }
  }
  return result;
}

function checkChallenge(act, challenge) {
  var actDate = (act.activity_date || '').split('T')[0];
  if (actDate < challenge.start_date || actDate > challenge.end_date) return false;
  var sportTypes = Array.isArray(challenge.sport_types) && challenge.sport_types.length
    ? challenge.sport_types : ['Walk','Run','Hike','Ride'];
  if (sportTypes.indexOf(act.sport_type) === -1) return false;
  var km = (act.distance_meters || 0) / 1000;
  if (challenge.distance_type === 'fixed') {
    if (km < challenge.distance_min - 0.1 || km > challenge.distance_max + 0.1) return false;
  } else if (challenge.distance_type === 'range') {
    if (km < challenge.distance_min || km > challenge.distance_max) return false;
  } else {
    if (km < challenge.distance_min) return false;
  }
  if ((challenge.elevation_criteria || 0) > 0 && (act.elevation_gain || 0) < challenge.elevation_criteria) return false;
  if (challenge.start_time_criteria && act.activity_date && act.activity_date.indexOf('T') > -1) {
    var timeStr = act.activity_date.split('T')[1] || '';
    var isImported = timeStr.startsWith('06:30:00');
    if (!isImported) {
      var actTime = new Date(act.activity_date);
      var actHour = actTime.getHours(), actMin = actTime.getMinutes();
      var parts = challenge.start_time_criteria.split(':');
      var critH = parseInt(parts[0]), critM = parseInt(parts[1] || 0);
      var actMins = actHour * 60 + actMin, critMins = critH * 60 + critM;
      if (Math.abs(actMins - critMins) > 30) return false;
    }
  }
  return true;
}

function calcFullPts(myActs, gender) {
  var byDay = {};
  myActs.filter(function(a){ return !a.is_flagged; }).forEach(function(a) {
    var d = (a.activity_date || '').split('T')[0];
    if (!d) return;
    if (!byDay[d]) byDay[d] = [];
    byDay[d].push(a);
  });

  var totalDistKm = 0.0, totalDistPts = 0.0, totalBonus = 0, totalChallenge = 0;
  var earnedChallenges = {}, challengeNames = [];

  Object.keys(byDay).forEach(function(day) {
    var dayActs = byDay[day];
    var inRangeKm = 0.0, outRangeKm = 0.0;

    var rsChallenge = null;
    for (var ri = 0; ri < CHALLENGES.length; ri++) {
      var rc = CHALLENGES[ri];
      if (rc.range_split && rc.is_active && day >= rc.start_date && day <= rc.end_date) {
        rsChallenge = rc; break;
      }
    }

    dayActs.forEach(function(a) {
      var actKm = (parseFloat(a.distance_meters) || 0) / 1000.0;
      if (rsChallenge) {
        var cST = Array.isArray(rsChallenge.sport_types) && rsChallenge.sport_types.length
          ? rsChallenge.sport_types : ['Walk','Run','Hike','Ride'];
        var inRange = cST.indexOf(a.sport_type) > -1
          && actKm >= (rsChallenge.distance_min - 0.1)
          && actKm <= rsChallenge.distance_max;
        if (inRange) { inRangeKm += actKm; return; }
      }
      outRangeKm += actKm;
    });

    var DAILY_CAP = 21;
    var isSpecialDay = SPECIAL_DAYS.indexOf(day) !== -1;
    inRangeKm  = parseFloat(inRangeKm.toFixed(4));
    outRangeKm = parseFloat(outRangeKm.toFixed(4));
    var combinedKm = inRangeKm + outRangeKm;
    if (!isSpecialDay && combinedKm > DAILY_CAP) {
      var excess = combinedKm - DAILY_CAP;
      var outTrim = Math.min(excess, outRangeKm);
      outRangeKm = parseFloat((outRangeKm - outTrim).toFixed(4));
      excess -= outTrim;
      if (excess > 0) inRangeKm = parseFloat((inRangeKm - excess).toFixed(4));
    }
    inRangeKm  = parseFloat(inRangeKm.toFixed(4));
    outRangeKm = parseFloat(outRangeKm.toFixed(4));

    var base = parseFloat(CONFIG.basePer_km) || 1;
    totalDistKm  += inRangeKm + outRangeKm;
    totalDistPts += parseFloat(((inRangeKm + outRangeKm) * base).toFixed(2));
    byDay[day]._dayKm     = outRangeKm;
    byDay[day]._inRangeKm = inRangeKm;
  });

  // Recalculate bonus — exclude days covered by exclude_normal_bonus challenges
  var excludeBonusDays = {};
  for (var ci2 = 0; ci2 < CHALLENGES.length; ci2++) {
    var c2 = CHALLENGES[ci2];
    if (!c2.exclude_normal_bonus) continue;
    Object.keys(byDay).forEach(function(day) {
      if (day >= c2.start_date && day <= c2.end_date) excludeBonusDays[day] = true;
    });
  }
  totalBonus = 0;
  Object.keys(byDay).forEach(function(day) {
    if (!excludeBonusDays[day]) totalBonus += calcBonus(byDay[day]._dayKm || 0);
  });

  totalDistKm  = parseFloat(totalDistKm.toFixed(2));
  totalDistPts = parseFloat(totalDistPts.toFixed(2));

  // Challenge bonus
  for (var ci = 0; ci < CHALLENGES.length; ci++) {
    var c = CHALLENGES[ci];
    var key = 'ch_' + (c.id || ci);
    if (earnedChallenges[key]) continue;

    var g = (gender || '').toLowerCase();
    var eligible = c.eligible === 'all'
      || c.eligible === g
      || c.eligible === 'dayshift'
      || c.eligible === 'nightshift';
    if (!eligible) continue;

    var cSportTypes = Array.isArray(c.sport_types) && c.sport_types.length
      ? c.sport_types : ['Walk','Run','Hike','Ride'];
    var awarded = false;

    // range_split challenge
    if (c.range_split) {
      var inRangePts = 0, inRangeCount = 0;
      for (var rsi = 0; rsi < myActs.length; rsi++) {
        var ra = myActs[rsi];
        if (ra.is_flagged) continue;
        var raDate = (ra.activity_date || '').split('T')[0];
        if (raDate < c.start_date || raDate > c.end_date) continue;
        if (cSportTypes.indexOf(ra.sport_type) === -1) continue;
        var raKm = (ra.distance_meters || 0) / 1000;
        if (raKm >= (c.distance_min - 0.1) && raKm <= c.distance_max) {
          inRangePts += Number(c.bonus_points) || 0;
          inRangeCount++;
        }
      }
      if (inRangeCount > 0) {
        earnedChallenges[key] = true;
        totalChallenge += inRangePts;
        challengeNames.push(c.name);
      }
      continue;
    }

    // per_activity challenge
    var perActPts = Number(c.per_activity_points) || 0;
    if (perActPts > 0) {
      var count = 0;
      for (var ai2 = 0; ai2 < myActs.length; ai2++) {
        if (checkChallenge(myActs[ai2], c)) count++;
      }
      if (count > 0) {
        earnedChallenges[key] = true;
        totalChallenge += count * perActPts;
        challengeNames.push(c.name);
      }
      continue;
    }

    if (c.activity_scope === 'daily') {
      var cDays = Object.keys(byDay).filter(function(d) {
        return d >= c.start_date && d <= c.end_date;
      });
      var cDaysIST = Object.keys(byDay).filter(function(d) {
        var next = new Date(d + 'T00:00:00Z');
        next.setDate(next.getDate() + 1);
        var nextStr = next.toISOString().split('T')[0];
        return nextStr >= c.start_date && nextStr <= c.end_date && cDays.indexOf(d) === -1;
      });
      var allCDays = cDays.concat(cDaysIST);
      for (var di = 0; di < allCDays.length; di++) {
        if (awarded) break;
        var day2 = allCDays[di];
        var dayActs2 = byDay[day2] || [];
        var hasMatchingSport = dayActs2.some(function(a){ return cSportTypes.indexOf(a.sport_type) > -1; });
        if (!hasMatchingSport) continue;
        var dayTotalKm = 0;
        dayActs2.forEach(function(a){
          if (cSportTypes.indexOf(a.sport_type) > -1) dayTotalKm += (a.distance_meters || 0) / 1000;
        });
        var qualifies = false;
        if (c.distance_type === 'fixed' || c.distance_type === 'range') {
          qualifies = dayTotalKm >= c.distance_min - 0.1 && dayTotalKm <= c.distance_max + 0.1;
        } else {
          qualifies = dayTotalKm >= c.distance_min;
        }
        if (qualifies) awarded = true;
      }
    } else {
      for (var ai = 0; ai < myActs.length; ai++) {
        if (checkChallenge(myActs[ai], c)) { awarded = true; break; }
      }
    }

    if (awarded) {
      earnedChallenges[key] = true;
      totalChallenge += Number(c.bonus_points) || 0;
      challengeNames.push(c.name);
    }
  }

  // Manual bonus
  myActs.filter(function(a){ return !a.is_flagged && parseFloat(a.manual_bonus) > 0; }).forEach(function(a) {
    totalChallenge += parseFloat(a.manual_bonus) || 0;
  });

  totalChallenge = parseFloat(totalChallenge.toFixed(2));

  return {
    km:          totalDistKm,
    distPts:     totalDistPts,
    bonusPts:    totalBonus,
    challengePts: totalChallenge,
    total:       parseFloat((totalDistPts + totalBonus + totalChallenge).toFixed(2))
  };
}


async function fetchAll(url){var all=[],from=0,ps=1000;while(true){var sep=url.indexOf('?')>-1?'&':'?';var res=await fetch(url+sep+'limit='+ps+'&offset='+from,{headers:Object.assign({},HDR,{'Range-Unit':'items','Range':from+'-'+(from+ps-1)})});if(!res.ok)break;var page=await res.json();if(!Array.isArray(page)||page.length===0)break;all=all.concat(page);if(page.length<ps)break;from+=ps;}return all;}

function getRows(mode){
  if(!ME)return[];
  var myGender=norm(ME.gender),myShift=norm(ME.shift),myTeam=norm(ME.leaderboard_team),isNight=myShift.indexOf('night')>-1,isFemale=myGender==='female'||myGender==='f';
  var filtered=REG.filter(function(p){var pg=norm(p.gender),ps=norm(p.shift),pt=norm(p.leaderboard_team),pIsFemale=pg==='female'||pg==='f';if(pIsFemale!==isFemale)return false;if(mode==='team')return pt===myTeam;return ps.indexOf('night')>-1===isNight;});
  return filtered.map(function(p){return{p:p,pts:calcFullPts(ACTS.filter(function(a){return String(a.strava_athlete_id)===String(p.strava_athlete_id);}),p.gender)};}).filter(function(r){return r.pts.total>0;}).sort(function(a,b){return b.pts.total-a.pts.total;});
}

function renderRows(rows){
  var meId=ME?String(ME.strava_athlete_id):'',list=document.getElementById('lb-list');
  if(rows.length===0){list.innerHTML='<div class="empty-box"><div class="ei">🏃</div><p>No activities yet in this category.</p></div>';document.getElementById('my-rank').textContent='—';return;}
  list.innerHTML='';var myRank=0;
  rows.forEach(function(r,i){
    var isMe=String(r.p.strava_athlete_id)===meId;if(isMe)myRank=i+1;
    var topCls=i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'';
    var rankIcon=i===0?'🥇':i===1?'🥈':i===2?'🥉':'#'+(i+1);
    var rankColCls=i===0?'r1':i===1?'r2':i===2?'r3':'rn';
    var mPts=r.pts.total,rowMedal=mPts>=goldThresh?'🥇':mPts>=silverThresh?'🥈':mPts>=bronzeThresh?'🥉':'';
    var teamName=(r.p.leaderboard_team||'').replace(/^Team\s+/i,'');
    var row=document.createElement('div'); row.className='lb-row'+' '+topCls+(isMe?' is-me':'');
    row.innerHTML=
      '<div class="rank-col '+rankColCls+'">'+rankIcon+'</div>'+
      '<div class="row-body">'+
        '<div class="row-left">'+
          '<span class="row-name">'+esc(r.p.full_name||'—')+(isMe?'<span class="you-chip">You</span>':'')+'</span>'+
          (teamName?'<div class="row-tag-row"><span class="rpill team">'+esc(teamName)+'</span></div>':'')+
        '</div>'+
        '<div class="row-right">'+
          '<div class="row-pts">'+
            (rowMedal?'<span class="row-medal">'+rowMedal+'</span>':'')+
            '<span class="row-pts-num">'+r.pts.total.toFixed(1)+'</span>'+
            '<span class="row-pts-unit"> pts</span>'+
          '</div>'+
          '<div class="row-pills">'+
            '<span class="rpill km">'+r.pts.km.toFixed(1)+' km</span>'+
            '<span class="rpill bon">⚡'+r.pts.bonusPts+'</span>'+
            (r.pts.challengePts>0?'<span class="rpill chal">🎯'+r.pts.challengePts.toFixed(1)+'</span>':'')+
          '</div>'+
        '</div>'+
      '</div>';
    list.appendChild(row);
  });
  var rnkEl=document.getElementById('my-rank');if(rnkEl&&myRank>0)rnkEl.textContent='#'+myRank;
}

function switchTab(mode){
  currentTab=mode;
  document.getElementById('lb-tab-shift').classList.toggle('active',mode==='shift');
  document.getElementById('lb-tab-team').classList.toggle('active',mode==='team');
  renderRows(getRows(mode));
}
function buildTabs(){
  if(!ME)return;
  var myGender=norm(ME.gender),myShift=norm(ME.shift),myTeam=ME.leaderboard_team||'My Team',isNight=myShift.indexOf('night')>-1,isFemale=myGender==='female'||myGender==='f';
  var gLabel=isFemale?'Female':'Male';
  document.getElementById('lb-tab-shift').textContent=isNight?'🌙 Nightshift — All':(isFemale?'👩 Dayshift — Female':'👨 Dayshift — Male');
  document.getElementById('lb-tab-team').textContent='🏙️ '+myTeam+' — '+gLabel;
}
function showSkeletons(){var h='';for(var i=0;i<6;i++)h+='<div class="skel-row"><div class="skeleton skel-c"></div><div class="skel-lines"><div class="skeleton skel-l m"></div><div class="skeleton skel-l s"></div></div></div>';document.getElementById('lb-list').innerHTML=h;}

async function boot(){
  var s=JSON.parse(sessionStorage.getItem('wk_user')||'{}');
  if(!s.loggedIn||!s.athleteId){window.location.href='index.html';return;}
  try{
    var results=await Promise.all([
      fetch(SB+'/rest/v1/registration?strava_athlete_id=eq.'+s.athleteId+'&select=*',{headers:HDR}),
      fetchAll(SB+'/rest/v1/registration?select=strava_athlete_id,full_name,gender,shift,leaderboard_team'),
      fetchAll(SB+'/rest/v1/activities?is_deleted=eq.false&select=strava_athlete_id,distance_meters,activity_date,is_flagged,sport_type,manual_bonus,elevation_gain'),
      fetch(SB+'/rest/v1/leaderboard_config?select=config_key,config_value',{headers:HDR}),
      fetch(SB+'/rest/v1/challenges?is_active=eq.true&select=*',{headers:HDR}),
      fetch(SB+'/rest/v1/special_scoring_days?select=special_date',{headers:HDR}),
      fetch(SB+'/rest/v1/leaderboard_config?config_key=eq.medals&select=config_value',{headers:HDR})
    ]);
    var myRegs=await results[0].json();
    ME=(Array.isArray(myRegs)&&myRegs.length)?myRegs[0]:{strava_athlete_id:s.athleteId};
    REG=results[1]; ACTS=results[2];
    var cfgRows=await results[3].json();
    if(Array.isArray(cfgRows))cfgRows.forEach(function(row){if(row.config_key==='bonus_points')CONFIG.bonus=row.config_value.map(function(b){return{km:Number(b.km),points:Number(b.points||b.pts||0)};});if(row.config_key==='base_points_per_km')CONFIG.basePer_km=parseFloat(row.config_value)||1;});
    var chRows=await results[4].json(); CHALLENGES=Array.isArray(chRows)?chRows:[];
    var sdRows=await results[5].json(); SPECIAL_DAYS=Array.isArray(sdRows)?sdRows.map(function(x){return x.special_date;}):[];
    var medalRows=await results[6].json();
    if(Array.isArray(medalRows)&&medalRows.length&&medalRows[0].config_value){var mt=medalRows[0].config_value,gKey=((ME.gender||'').toLowerCase()==='female')?'female':'male';bronzeThresh=Number(mt.bronze&&mt.bronze[gKey]||100);silverThresh=Number(mt.silver&&mt.silver[gKey]||150);goldThresh=Number(mt.gold&&mt.gold[gKey]||200);}
    var name=ME.full_name||s.name||'Participant';
    document.getElementById('my-name').textContent=name.toUpperCase();
    var initials=name.split(' ').map(function(w){return w[0]||'';}).slice(0,2).join('').toUpperCase();
      var tags=[];if(ME.gender)tags.push(ME.gender);if(ME.shift)tags.push(ME.shift);if(ME.leaderboard_team)tags.push(ME.leaderboard_team);
    document.getElementById('my-tags').innerHTML=tags.map(function(t){return'<span class="my-tag">'+esc(t)+'</span>';}).join('');
    buildTabs(); renderRows(getRows(currentTab));
    var allRows=getRows(currentTab),myRow=allRows.find(function(r){return String(r.p.strava_athlete_id)===String(s.athleteId);});
    document.getElementById('my-pts').textContent=myRow?myRow.pts.total.toFixed(1):'—';
  }catch(e){console.error('Leaderboard boot error:',e);document.getElementById('lb-list').innerHTML='<div class="empty-box"><div class="ei">⚠️</div><p>Could not load leaderboard.<br>Tap refresh to try again.</p></div>';}
}
function doRefresh(){document.getElementById('refresh-icon').classList.add('spinning');showSkeletons();boot().finally(function(){document.getElementById('refresh-icon').classList.remove('spinning');});}
boot();
</script>
