<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0F1117">
  <title>Leaderboard — Arcgate Walkathon 2026</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    :root{
      --brand:#E8622A; --brand-bg:#FFF0EA;
      --dark:#0F1117; --bg:#F0F2F7; --white:#fff;
      --border:rgba(0,0,0,0.065); --text:#0F1117; --muted:#6B7280;
      --gold:#F59E0B; --silver:#94A3B8; --bronze:#CD7F32; --green:#059669;
      --radius:14px; --radius-sm:11px;
      --shadow:0 1px 2px rgba(0,0,0,0.05),0 3px 12px rgba(0,0,0,0.06);
      --font:'Poppins',-apple-system,sans-serif;
    }
    html,body{height:100%;}
    body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;flex-direction:column;min-height:100dvh;-webkit-font-smoothing:antialiased;}

    /* ── Top bar ── */
    .top-bar{position:sticky;top:0;z-index:200;background:var(--dark);}

    .header{padding:max(13px,env(safe-area-inset-top)) 18px 13px;display:flex;align-items:center;justify-content:space-between;}
    .header-logo{display:flex;align-items:center;gap:9px;}
    .header-logo-icon{width:30px;height:30px;border-radius:8px;background:var(--brand);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .header-logo-icon img{width:20px;height:20px;object-fit:contain;filter:brightness(0) invert(1);}
    .header-wordmark{font-size:12px;font-weight:700;color:rgba(255,255,255,0.82);line-height:1.2;}
    .header-wordmark span{display:block;font-size:9px;font-weight:400;color:rgba(255,255,255,0.3);}
    .hdr-right{display:flex;align-items:center;gap:4px;}
    .icon-btn{background:none;border:none;cursor:pointer;padding:8px;border-radius:8px;color:rgba(255,255,255,0.45);display:flex;align-items:center;}
    .icon-btn:hover{color:#fff;background:rgba(255,255,255,0.07);}
    .icon-btn svg{width:17px;height:17px;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .spinning{animation:spin 1s linear infinite;}
    .sign-out{font-size:11px;color:rgba(255,255,255,0.38);background:none;border:1px solid rgba(255,255,255,0.1);cursor:pointer;padding:5px 11px;border-radius:20px;font-family:var(--font);font-weight:500;transition:all 0.15s;}
    .sign-out:hover{color:#fff;border-color:rgba(255,255,255,0.28);}

    /* ── My banner — orange pill ── */
    .my-banner{
      background:var(--brand);
      padding:10px 18px 13px;
      display:flex;align-items:center;gap:12px;
    }
    .my-initials{
      width:38px;height:38px;border-radius:50%;
      background:rgba(255,255,255,0.2);color:#fff;
      display:flex;align-items:center;justify-content:center;
      font-size:13px;font-weight:800;flex-shrink:0;
      border:1.5px solid rgba(255,255,255,0.3);
    }
    .my-info{flex:1;min-width:0;}
    .my-name{font-size:13px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .my-tags{display:flex;gap:4px;margin-top:3px;flex-wrap:wrap;}
    .my-tag{background:rgba(255,255,255,0.18);color:rgba(255,255,255,0.85);font-size:8px;font-weight:600;padding:2px 7px;border-radius:20px;}
    .my-pts-block,.my-rank-block{text-align:center;flex-shrink:0;}
    .my-pts-num,.my-rank-num{font-size:20px;font-weight:900;color:#fff;line-height:1;}
    .my-pts-lbl,.my-rank-lbl{font-size:8px;text-transform:uppercase;letter-spacing:0.5px;color:rgba(255,255,255,0.6);margin-top:2px;}

    /* ── Tabs ── */
    .lb-tabs{display:flex;background:var(--white);border-bottom:1px solid rgba(0,0,0,0.07);}
    .lb-tab{
      flex:1;padding:11px 8px 9px;
      font-size:12.5px;font-weight:700;color:var(--muted);
      background:none;border:none;border-bottom:2.5px solid transparent;
      cursor:pointer;font-family:var(--font);transition:all 0.15s;
    }
    .lb-tab.active{color:var(--brand);border-bottom-color:var(--brand);}

    /* ── Key legend ── */
    .lb-key{
      display:flex;gap:10px;padding:7px 14px 5px;
      font-size:9.5px;color:var(--muted);font-weight:600;letter-spacing:0.2px;
      flex-wrap:wrap;background:var(--white);
      border-bottom:1px solid rgba(0,0,0,0.05);
    }
    .lb-key span{display:flex;align-items:center;gap:3px;}

    /* ── Content scrollable ── */
    .content{flex:1;padding:10px 12px 86px;max-width:600px;width:100%;margin:0 auto;}

    /* ── Leaderboard rows — the JS renders these classes ── */
    .lb-row{
      background:var(--white);
      border-radius:var(--radius-sm);
      box-shadow:var(--shadow);
      padding:10px 12px;
      margin-bottom:6px;
      display:flex;align-items:flex-start;gap:9px;
      border:1.5px solid transparent;
      transition:transform 0.1s;
      cursor:default;
    }
    .lb-row:active{transform:scale(0.99);}

    /* podium accent */
    .lb-row.rank-gold  {background:#FFFBEB;border-left:3px solid var(--gold);border-radius:0 var(--radius-sm) var(--radius-sm) 0;}
    .lb-row.rank-silver{background:#F8FAFC;border-left:3px solid var(--silver);border-radius:0 var(--radius-sm) var(--radius-sm) 0;}
    .lb-row.rank-bronze{background:#FDF6EE;border-left:3px solid var(--bronze);border-radius:0 var(--radius-sm) var(--radius-sm) 0;}

    /* my row */
    .lb-row.is-me{border:1.5px solid var(--brand);background:#fff9f7;}
    .lb-row.is-me.rank-gold,.lb-row.is-me.rank-silver,.lb-row.is-me.rank-bronze{
      border:1.5px solid var(--brand);background:#fff9f7;border-left:1.5px solid var(--brand);border-radius:var(--radius-sm);
    }

    /* rank number */
    .rank-col{font-size:13px;font-weight:900;color:var(--muted);min-width:26px;flex-shrink:0;padding-top:1px;}
    .rank-col.r1{color:var(--gold);font-size:15px;}
    .rank-col.r2{color:var(--silver);font-size:15px;}
    .rank-col.r3{color:var(--bronze);font-size:15px;}

    /* row body */
    .row-body{flex:1;min-width:0;overflow:hidden;}

    /* LINE 1: name | pts */
    .row-line1{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:4px;flex-wrap:nowrap;}
    .row-name{font-size:13px;font-weight:700;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .you-chip{display:inline-block;background:var(--brand);color:#fff;font-size:7.5px;font-weight:800;padding:1px 5px;border-radius:4px;margin-left:5px;vertical-align:middle;letter-spacing:0.2px;}
    .row-pts-right{display:flex;align-items:center;gap:4px;flex-shrink:0;}
    .row-medal-icon{font-size:13px;}
    .row-pts-main{font-size:15px;font-weight:900;color:var(--brand);white-space:nowrap;}
    .row-pts-unit{font-size:9.5px;font-weight:500;color:var(--muted);}

    /* LINE 2: team + pills */
    .row-line2{display:flex;align-items:center;gap:4px;flex-wrap:nowrap;overflow:hidden;margin-top:1px;}
    .row-team{font-size:9.5px;font-weight:600;color:var(--muted);margin-right:2px;}
    .row-stat{font-size:9.5px;font-weight:600;padding:2px 7px;border-radius:6px;white-space:nowrap;}
    .row-stat.km  {background:#EEF2FF;color:#4338CA;font-weight:700;}
    .row-stat.dist{background:#F0F4FF;color:#4338CA;opacity:0.8;}
    .row-stat.bon {background:#FFF7ED;color:#C2410C;}
    .row-stat.chal{background:#F0FDF4;color:#15803D;}

    /* skeleton */
    @keyframes shimmer{0%{background-position:-300px 0}100%{background-position:300px 0}}
    .skeleton{background:linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%);background-size:600px 100%;animation:shimmer 1.4s ease infinite;border-radius:6px;}
    .skel-row{display:flex;align-items:center;gap:10px;background:var(--white);border-radius:var(--radius-sm);box-shadow:var(--shadow);padding:13px;margin-bottom:6px;}
    .skel-c{width:36px;height:36px;border-radius:50%;flex-shrink:0;}
    .skel-lines{flex:1;}
    .skel-l{height:11px;margin-bottom:6px;} .skel-l.m{width:60%;} .skel-l.s{width:40%;margin-bottom:0;}

    .empty-box{text-align:center;padding:40px 20px;color:var(--muted);}
    .empty-box .ei{font-size:34px;display:block;margin-bottom:10px;opacity:0.4;}
    .empty-box p{font-size:13px;line-height:1.6;}

    /* ── Bottom nav ── */
    .bottom-nav{
      position:fixed;bottom:0;left:0;right:0;background:var(--white);
      border-top:1px solid rgba(0,0,0,0.07);
      display:grid;grid-template-columns:1fr 1fr 1fr;
      padding-bottom:max(13px,env(safe-area-inset-bottom));
      z-index:200;box-shadow:0 -2px 16px rgba(0,0,0,0.07);
    }
    .bnav-a{
      display:flex;flex-direction:column;align-items:center;
      padding:11px 6px 4px;text-decoration:none;
      color:var(--muted);font-size:9px;font-weight:700;
      letter-spacing:0.4px;text-transform:uppercase;gap:4px;
      transition:color 0.15s;position:relative;
    }
    .bnav-a svg{width:21px;height:21px;}
    .bnav-a.active{color:var(--brand);}
    .bnav-a.active::before{content:'';position:absolute;top:0;left:22%;right:22%;height:2.5px;background:var(--brand);border-radius:0 0 3px 3px;}
    .bnav-a:hover{color:var(--brand);}
  </style>
</head>
<body>

    <div class="skel-row"><div class="skeleton skel-c"></div><div class="skel-lines"><div class="skeleton skel-l m"></div><div class="skeleton skel-l s"></div></div></div>
    <div class="skel-row"><div class="skeleton skel-c"></div><div class="skel-lines"><div class="skeleton skel-l m"></div><div class="skeleton skel-l s"></div></div></div>

</div>

<script>


var SB   = 'https://jhdgkncpkrttvemvwukc.supabase.co';
var ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpoZGdrbmNwa3J0dHZlbXZ3dWtjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NzgyNjMsImV4cCI6MjA5NzI1NDI2M30.d7mvXOYDq5G4aqs1Mbc6HFNgTBlQk4B6ah0eahE_yZE';
var HDR  = { apikey: ANON, Authorization: 'Bearer ' + ANON };

var ME   = null;
var REG  = [];
var ACTS = [];
var currentTab = 'shift';
var bronzeThresh = 100, silverThresh = 150, goldThresh = 200;

/* ── helpers ── */
function logout() {
  sessionStorage.removeItem('wk_user');
  sessionStorage.removeItem('wk_admin');
  window.location.href = 'index.html';
}
function esc(v) {
  return String(v == null ? '' : v)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function norm(s) { return String(s || '').trim().toLowerCase(); }

/* ── points calc — exact match to admin leaderboard ── */
var CONFIG  = { basePer_km: 1, bonus: [{km:5,points:1},{km:8,points:2},{km:10,points:3},{km:15,points:4},{km:21,points:7}] };
var CHALLENGES   = [];
var SPECIAL_DAYS = [];

// ── Exact same calc as dashboard (admin-matching) ──────────────────────────
// Bonus calc — exact match to admin leaderboard CONFIG
function calcBonus(km) {
  var result = 0;
  var sorted = CONFIG.bonus.slice().sort(function(a,b){ return b.km - a.km; });
  for (var i = 0; i < sorted.length; i++) {
    if (km >= Number(sorted[i].km)) { result = Number(sorted[i].points || sorted[i].pts || 0); break; }
  }
  return result;
}

// Full points breakdown for one athlete — mirrors admin calcPoints exactly

function checkChallengeSingle(act, ch, cSports) {
  var actDate = (act.activity_date || '').split('T')[0];
  // date window
  if (actDate < ch.start_date || actDate > ch.end_date) return false;
  // sport type
  if (cSports.indexOf(act.sport_type) === -1) return false;
  var km = (act.distance_meters || 0) / 1000;
  // distance
  if (ch.distance_type === 'fixed' || ch.distance_type === 'range') {
    if (km < ch.distance_min - 0.1 || km > ch.distance_max + 0.1) return false;
  } else { // extended (min+)
    if (km < ch.distance_min) return false;
  }
  // elevation
  if ((ch.elevation_criteria || 0) > 0 && (act.elevation_gain || 0) < ch.elevation_criteria) return false;
  // start time (skip imported placeholder 06:30:00)
  if (ch.start_time_criteria && act.activity_date && act.activity_date.indexOf('T') > -1) {
    var timeStr = act.activity_date.split('T')[1] || '';
    if (!timeStr.startsWith('06:30:00')) {
      var actTime = new Date(act.activity_date);
      var actMins = actTime.getHours() * 60 + actTime.getMinutes();
      var parts   = ch.start_time_criteria.split(':');
      var critMins = parseInt(parts[0]) * 60 + parseInt(parts[1] || 0);
      if (Math.abs(actMins - critMins) > 30) return false;
    }
  }
  return true;
}

function calcFullPts(myActs, gender) {
  // Build per-day map of valid (non-flagged) activities
  var byDay = {};
  myActs.filter(function(a){ return !a.is_flagged; }).forEach(function(a) {
    var d = (a.activity_date || '').split('T')[0];
    if (!d) return;
    if (!byDay[d]) byDay[d] = [];
    byDay[d].push(a);
  });

  var totalDistKm = 0, totalDistPts = 0, totalBonus = 0, totalChallenge = 0;
  var earnedChallenges = {};
  // dayBreakdown: { date: { km, distPts, bonusPts, challenges: [{name, pts}] } }
  var dayBreakdown = {};
  // actBreakdown: { strava_activity_id: { challenges: [{name, pts}] } }
  var actBreakdown = {};

  // ── Per-day distance + bonus ──────────────────────────────────────────────
  // Pre-compute which days have exclude_normal_bonus challenges
  var excludeBonusDays = {};
  CHALLENGES.forEach(function(ch) {
    if (!ch.exclude_normal_bonus) return;
    for (var day in byDay) {
      if (day >= ch.start_date && day <= ch.end_date) excludeBonusDays[day] = true;
    }
  });

  for (var day in byDay) {
    var dayKm = 0;
    byDay[day].forEach(function(a){ dayKm += (parseFloat(a.distance_meters) || 0) / 1000; });
    dayKm = parseFloat(dayKm.toFixed(4));
    var isSpecial = SPECIAL_DAYS.indexOf(day) !== -1;
    if (!isSpecial && dayKm > 21) dayKm = 21;
    dayKm = parseFloat(dayKm.toFixed(4));
    var base = parseFloat(CONFIG.basePer_km) || 1;
    var dPts = parseFloat((dayKm * base).toFixed(2));
    var bPts = excludeBonusDays[day] ? 0 : calcBonus(dayKm);
    totalDistKm  += dayKm;
    totalDistPts += dPts;
    totalBonus   += bPts;
    dayBreakdown[day] = { km: dayKm, distPts: dPts, bonusPts: bPts, challenges: [] };
  }
  totalDistKm  = parseFloat(totalDistKm.toFixed(2));
  totalDistPts = parseFloat(totalDistPts.toFixed(2));

  // ── Challenges ────────────────────────────────────────────────────────────
  for (var ci = 0; ci < CHALLENGES.length; ci++) {
    var ch = CHALLENGES[ci];
    var key = 'ch_' + (ch.id || ci);
    if (earnedChallenges[key]) continue;

    // Eligibility check
    var g = (gender || '').toLowerCase();
    var eligible = ch.eligible === 'all'
      || ch.eligible === g
      || ch.eligible === 'dayshift'
      || ch.eligible === 'nightshift';
    if (!eligible) continue;

    var cSports = (Array.isArray(ch.sport_types) && ch.sport_types.length)
      ? ch.sport_types : ['Walk', 'Run', 'Hike', 'Ride'];
    var chPts = Number(ch.bonus_points) || 0;
    var chName = ch.name || 'Challenge';
    var awarded = false;
    var awardedDay = null;
    var awardedActId = null;

    if (ch.activity_scope === 'daily') {
      // ── Daily scope: total km for the day must qualify ──
      for (var day in byDay) {
        if (awarded) break;
        // Check date window (+ IST UTC+1 offset)
        var next = new Date(day + 'T00:00:00Z');
        next.setDate(next.getDate() + 1);
        var nStr = next.toISOString().split('T')[0];
        var inRange = (day >= ch.start_date && day <= ch.end_date) ||
                      (nStr >= ch.start_date && nStr <= ch.end_date);
        if (!inRange) continue;

        var dActs = byDay[day];
        var hasSport = dActs.some(function(a){ return cSports.indexOf(a.sport_type) > -1; });
        if (!hasSport) continue;

        var dKm = 0;
        dActs.forEach(function(a){
          if (cSports.indexOf(a.sport_type) > -1) dKm += (a.distance_meters || 0) / 1000;
        });

        if (ch.distance_type === 'fixed' || ch.distance_type === 'range') {
          awarded = dKm >= ch.distance_min - 0.1 && dKm <= ch.distance_max + 0.1;
        } else {
          awarded = dKm >= ch.distance_min;
        }
        if (awarded) awardedDay = day;
      }

    } else {
      // ── Single activity scope ──
      var validActs = myActs.filter(function(a){ return !a.is_flagged; });
      var perActPts = Number(ch.per_activity_points) || 0;

      if (perActPts > 0) {
        // Per-activity challenge (e.g. 3KM Repeats): award per_activity_points for EACH qualifying activity
        for (var ai = 0; ai < validActs.length; ai++) {
          var a = validActs[ai];
          if (checkChallengeSingle(a, ch, cSports)) {
            awarded = true;
            var actDay = (a.activity_date || '').split('T')[0];
            totalChallenge += perActPts;
            if (actDay && dayBreakdown[actDay]) {
              dayBreakdown[actDay].challenges.push({ name: chName, pts: perActPts, actId: a.strava_activity_id });
            }
            if (!actBreakdown[a.strava_activity_id]) actBreakdown[a.strava_activity_id] = { challenges: [] };
            actBreakdown[a.strava_activity_id].challenges.push({ name: chName, pts: perActPts });
          }
        }
        if (awarded) earnedChallenges[key] = true;

      } else {
        // One-time award: first matching activity only
        for (var ai = 0; ai < validActs.length; ai++) {
          if (awarded) break;
          var a = validActs[ai];
          if (checkChallengeSingle(a, ch, cSports)) {
            awarded = true;
            awardedActId = a.strava_activity_id;
            awardedDay   = (a.activity_date || '').split('T')[0];
          }
        }
        if (awarded) {
          earnedChallenges[key] = true;
          totalChallenge += chPts;
          if (awardedDay && dayBreakdown[awardedDay]) {
            dayBreakdown[awardedDay].challenges.push({ name: chName, pts: chPts, actId: awardedActId });
          }
          if (awardedActId) {
            if (!actBreakdown[awardedActId]) actBreakdown[awardedActId] = { challenges: [] };
            actBreakdown[awardedActId].challenges.push({ name: chName, pts: chPts });
          }
        }
      }
    }

    // For daily-scope one-time awards
    if (awarded && ch.activity_scope === 'daily') {
      earnedChallenges[key] = true;
      totalChallenge += chPts;
      if (awardedDay && dayBreakdown[awardedDay]) {
        dayBreakdown[awardedDay].challenges.push({ name: chName, pts: chPts, actId: awardedActId });
      }
    }
  }

  // ── Manual bonus (per activity) ───────────────────────────────────────────
  myActs.filter(function(a){ return !a.is_flagged && parseFloat(a.manual_bonus) > 0; }).forEach(function(a){
    var mb = parseFloat(a.manual_bonus);
    totalChallenge += mb;
    var day = (a.activity_date || '').split('T')[0];
    if (dayBreakdown[day]) {
      dayBreakdown[day].challenges.push({ name: 'Manual bonus', pts: mb, actId: a.strava_activity_id });
    }
    if (!actBreakdown[a.strava_activity_id]) actBreakdown[a.strava_activity_id] = { challenges: [] };
    actBreakdown[a.strava_activity_id].challenges.push({ name: 'Manual bonus', pts: mb });
  });

  totalChallenge = parseFloat(totalChallenge.toFixed(2));

  return {
    km:          totalDistKm,
    distPts:     totalDistPts,
    bonusPts:    totalBonus,
    challengePts: totalChallenge,
    total:       parseFloat((totalDistPts + totalBonus + totalChallenge).toFixed(2)),
    dayBreakdown: dayBreakdown,
    actBreakdown: actBreakdown
  };
}


/* ── fetch all pages/* ── fetch all pages from Supabase ── */
async function fetchAll(url) {
  var all = [], from = 0, ps = 1000;
  while (true) {
    var sep = url.indexOf('?') > -1 ? '&' : '?';
    var res = await fetch(url + sep + 'limit=' + ps + '&offset=' + from, {
      headers: Object.assign({}, HDR, { 'Range-Unit':'items', 'Range': from + '-' + (from + ps - 1) })
    });
    if (!res.ok) break;
    var page = await res.json();
    if (!Array.isArray(page) || page.length === 0) break;
    all = all.concat(page);
    if (page.length < ps) break;
    from += ps;
  }
  return all;
}

/* ── filter rows for a given tab ── */
function getRows(mode) {
  if (!ME) return [];

  var myGender  = norm(ME.gender);
  var myShift   = norm(ME.shift);
  var myTeam    = norm(ME.leaderboard_team);
  var isNight   = myShift.indexOf('night') > -1;
  var isFemale  = myGender === 'female' || myGender === 'f';

  var filtered = REG.filter(function(p) {
    var pg = norm(p.gender);
    var ps = norm(p.shift);
    var pt = norm(p.leaderboard_team);
    var pIsFemale = (pg === 'female' || pg === 'f');

    // gender must match
    if (pIsFemale !== isFemale) return false;

    if (mode === 'team') {
      // same team, same gender
      return pt === myTeam;
    }

    // shift mode: same shift type (night vs day)
    var pIsNight = ps.indexOf('night') > -1;
    return pIsNight === isNight;
  });

  return filtered
    .map(function(p) { return { p: p, pts: calcFullPts(ACTS.filter(function(a){ return String(a.strava_athlete_id) === String(p.strava_athlete_id); }), p.gender) }; })
    .filter(function(r) { return r.pts.total > 0; })
    .sort(function(a, b) { return b.pts.total - a.pts.total; });
}

/* ── render rows ── */
function renderRows(rows) {
  var meId = ME ? String(ME.strava_athlete_id) : '';
  var list = document.getElementById('lb-list');

  if (rows.length === 0) {
    list.innerHTML = '<div class="empty-box"><div class="ei">🏃</div><p>No activities yet in this category.</p></div>';
    var rnkEl = document.getElementById('my-rank'); if(rnkEl) rnkEl.textContent = '—';
    return;
  }

  list.innerHTML = '';
  var myRank = 0;

  rows.forEach(function(r, i) {
    var isMe = String(r.p.strava_athlete_id) === meId;
    if (isMe) myRank = i + 1;
    var rc = i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : '';
    var rl = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '#' + (i + 1);
    var meta = [r.p.leaderboard_team, r.p.shift, r.p.gender].filter(Boolean).join(' · ');

    // medal for this participant
    var mPts = r.pts.total;
    var rowMedal = '';
    if (mPts >= goldThresh)        rowMedal = '🥇';
    else if (mPts >= silverThresh) rowMedal = '🥈';
    else if (mPts >= bronzeThresh) rowMedal = '🥉';

    var topCls = i === 0 ? ' rank-gold' : i === 1 ? ' rank-silver' : i === 2 ? ' rank-bronze' : '';
    var row = document.createElement('div');
    row.className = 'lb-row' + topCls + (isMe ? ' is-me' : '');

    // Line 1: medal + points (left) | name (right)
    // Line 2: team | 📏km | dist pts | ⚡bonus | 🎯challenge
    var kmRaw = r.pts.km.toFixed(1);
    var teamName = (r.p.leaderboard_team || '').replace(/^Team\s+/i, '');
    row.innerHTML =
      '<div class="rank-col ' + rc + '">' + rl + '</div>' +
      '<div class="row-body">' +
        '<div class="row-line1">' +
          '<span class="row-name">' + esc(r.p.full_name || '—') + (isMe ? '<span class="you-chip">You</span>' : '') + '</span>' +
          '<span class="row-pts-right">' +
            (rowMedal ? '<span class="row-medal-icon">' + rowMedal + '</span> ' : '') +
            '<span class="row-pts-main">' + r.pts.total.toFixed(1) + '</span>' +
            '<span class="row-pts-unit"> pts</span>' +
          '</span>' +
        '</div>' +
        '<div class="row-line2">' +
          (teamName ? '<span class="row-team">' + esc(teamName) + '</span>' : '') +
          '<span class="row-stat km">📏 ' + kmRaw + ' km</span>' +
          '<span class="row-stat dist">Dist ' + r.pts.distPts.toFixed(1) + '</span>' +
          '<span class="row-stat bon">⚡+' + r.pts.bonusPts + '</span>' +
          (r.pts.challengePts > 0 ? '<span class="row-stat chal">🎯+' + r.pts.challengePts.toFixed(1) + '</span>' : '') +
        '</div>' +
      '</div>';

    list.appendChild(row);
  });

  var rnkEl2 = document.getElementById('my-rank'); if(rnkEl2 && myRank > 0) rnkEl2.textContent = '#' + myRank;


}

/* ── tab switching ── */
function switchTab(mode) {
  currentTab = mode;
  document.getElementById('lb-tab-shift').classList.toggle('active', mode === 'shift');
  document.getElementById('lb-tab-team').classList.toggle('active',  mode === 'team');
  renderRows(getRows(mode));
}

/* ── update tab labels ── */
function buildTabs() {
  if (!ME) return;
  var myGender = norm(ME.gender);
  var myShift  = norm(ME.shift);
  var myTeam   = ME.leaderboard_team || 'My Team';
  var isNight  = myShift.indexOf('night') > -1;
  var isFemale = myGender === 'female' || myGender === 'f';
  var gLabel   = isFemale ? 'Female' : 'Male';
  var shiftLabel = isNight ? '🌙 Nightshift — All' : (isFemale ? '👩 Dayshift — Female' : '👨 Dayshift — Male');
  var teamLabel  = '🏙️ ' + myTeam + ' — ' + gLabel;
  document.getElementById('lb-tab-shift').textContent = shiftLabel;
  document.getElementById('lb-tab-team').textContent  = teamLabel;
}

/* ── skeletons ── */
function showSkeletons() {
  var h = '';
  for (var i = 0; i < 6; i++) {
    h += '<div class="skel-row"><div class="skeleton skel-c"></div><div class="skel-lines"><div class="skeleton skel-l m"></div><div class="skeleton skel-l s"></div></div></div>';
  }
  document.getElementById('lb-list').innerHTML = h;
}

/* ── boot ── */
async function boot() {
  var s = JSON.parse(sessionStorage.getItem('wk_user') || '{}');
  if (!s.loggedIn || !s.athleteId) { window.location.href = 'index.html'; return; }

  try {
    // Fetch in parallel — including config, challenges, special days
    var results = await Promise.all([
      fetch(SB + '/rest/v1/registration?strava_athlete_id=eq.' + s.athleteId + '&select=*', { headers: HDR }),
      fetchAll(SB + '/rest/v1/registration?select=strava_athlete_id,full_name,gender,shift,leaderboard_team'),
      fetchAll(SB + '/rest/v1/activities?is_deleted=eq.false&select=strava_athlete_id,distance_meters,activity_date,is_flagged,sport_type,manual_bonus,elevation_gain'),
      fetch(SB + '/rest/v1/leaderboard_config?select=config_key,config_value', { headers: HDR }),
      fetch(SB + '/rest/v1/challenges?is_active=eq.true&select=*', { headers: HDR }),
      fetch(SB + '/rest/v1/special_scoring_days?select=special_date', { headers: HDR }),
      fetch(SB + '/rest/v1/leaderboard_config?config_key=eq.medals&select=config_value', { headers: HDR })
    ]);

    var myRegs = await results[0].json();
    ME   = (Array.isArray(myRegs) && myRegs.length) ? myRegs[0] : { strava_athlete_id: s.athleteId };
    REG  = results[1];
    ACTS = results[2];

    // Load config
    var cfgRows = await results[3].json();
    if (Array.isArray(cfgRows)) cfgRows.forEach(function(row) {
      if (row.config_key === 'bonus_points') CONFIG.bonus = row.config_value.map(function(b){ return {km:Number(b.km),points:Number(b.points||b.pts||0)}; });
      if (row.config_key === 'base_points_per_km') CONFIG.basePer_km = parseFloat(row.config_value) || 1;
    });
    var chRows = await results[4].json();
    CHALLENGES = Array.isArray(chRows) ? chRows : [];
    var sdRows = await results[5].json();
    SPECIAL_DAYS = Array.isArray(sdRows) ? sdRows.map(function(x){ return x.special_date; }) : [];
    var medalRows = await results[6].json();
    if (Array.isArray(medalRows) && medalRows.length && medalRows[0].config_value) {
      var mt = medalRows[0].config_value;
      var gKey = ((ME.gender||'').toLowerCase() === 'female') ? 'female' : 'male';
      bronzeThresh = Number(mt.bronze && mt.bronze[gKey] || 100);
      silverThresh = Number(mt.silver && mt.silver[gKey] || 150);
      goldThresh   = Number(mt.gold   && mt.gold[gKey]   || 200);
    }

    // Banner
    var name = ME.full_name || s.name || 'Participant';
    document.getElementById('my-name').textContent = name;
    var initials = name.split(' ').map(function(w){ return w[0]||''; }).slice(0,2).join('').toUpperCase();
    var av = document.getElementById('my-initials'); if(av) av.textContent = initials;
    var tags = [];
    if (ME.gender)            tags.push(ME.gender);
    if (ME.shift)             tags.push(ME.shift);
    if (ME.leaderboard_team) tags.push(ME.leaderboard_team);
    document.getElementById('my-tags').innerHTML = tags.map(function(t) {
      return '<span class="my-tag">' + esc(t) + '</span>';
    }).join('');

    buildTabs();
    renderRows(getRows(currentTab));

    // Populate my-pts banner
    var myPtsEl = document.getElementById('my-pts');
    if (myPtsEl) {
      var allRows = getRows(currentTab);
      var myRow = allRows.find(function(r) {
        return String(r.p.strava_athlete_id) === String(s.athleteId);
      });
      myPtsEl.textContent = myRow ? myRow.pts.total.toFixed(1) : '—';
    }

  } catch (e) {
    console.error('Leaderboard boot error:', e);
    document.getElementById('lb-list').innerHTML =
      '<div class="empty-box"><div class="ei">⚠️</div><p>Could not load leaderboard.<br>Check connection and tap refresh.</p></div>';
  }
}

function doRefresh() {
  document.getElementById('refresh-icon').classList.add('spinning');
  showSkeletons();
  boot().finally(function() {
    document.getElementById('refresh-icon').classList.remove('spinning');
  });
}

boot();

// Update my points display in header
function updateMyPtsHeader(pts) {
  var el = document.getElementById('my-pts');
  if (el) el.textContent = pts !== undefined ? pts : '—';
}
