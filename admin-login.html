<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>Admin Login — Arcgate Walkathon 2026</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --brand:      #E8622A;
      --brand-dark: #d4551f;
      --bg:         #F4F6FA;
      --card:       #FFFFFF;
      --text:       #0F1117;
      --muted:      #6B7280;
      --border:     rgba(0,0,0,0.08);
      --shadow:     0 8px 40px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
      --font:       'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
      --radius:     14px;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ── Background decoration ── */
    body::before {
      content: '';
      position: fixed;
      top: -120px; left: -120px;
      width: 480px; height: 480px;
      background: radial-gradient(circle, rgba(232,98,42,0.10) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -80px; right: -80px;
      width: 360px; height: 360px;
      background: radial-gradient(circle, rgba(232,98,42,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── Card ── */
    .login-card {
      width: 100%;
      max-width: 400px;
      background: var(--card);
      border-radius: 20px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    /* ── Card top accent ── */
    .card-top {
      background: linear-gradient(135deg, #0F1117 0%, #1c2030 100%);
      padding: 36px 36px 28px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .card-top::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 160px; height: 160px;
      background: radial-gradient(circle, rgba(232,98,42,0.18) 0%, transparent 70%);
    }

    .logo-badge {
      width: 56px; height: 56px;
      background: var(--brand);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      box-shadow: 0 4px 16px rgba(232,98,42,0.4);
      position: relative;
    }
    .logo-badge img {
      width: 38px; height: 38px;
      object-fit: contain;
      filter: brightness(0) invert(1);
    }

    .card-top h1 {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
      letter-spacing: -0.3px;
    }
    .card-top p {
      font-size: 13px;
      color: rgba(255,255,255,0.45);
    }

    /* ── Form body ── */
    .card-body {
      padding: 32px 36px 36px;
    }

    .field {
      margin-bottom: 18px;
    }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 7px;
    }
    .input-wrap {
      position: relative;
    }
    .input-wrap i {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 17px;
      color: #C0C4CC;
      pointer-events: none;
    }
    .field input {
      width: 100%;
      padding: 11px 14px 11px 40px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-family: var(--font);
      color: var(--text);
      background: #FAFBFC;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    .field input:focus {
      outline: none;
      border-color: var(--brand);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(232,98,42,0.10);
    }
    .field input::placeholder { color: #C0C4CC; }

    /* ── Submit button ── */
    .btn-login {
      width: 100%;
      padding: 13px;
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: background 0.18s, transform 0.12s, box-shadow 0.18s;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-login:hover  { background: var(--brand-dark); box-shadow: 0 4px 16px rgba(232,98,42,0.35); }
    .btn-login:active { transform: scale(0.98); }
    .btn-login.loading { opacity: 0.7; pointer-events: none; }

    /* ── Error message ── */
    .error-msg {
      display: none;
      background: #FEF2F2;
      color: #DC2626;
      border: 1px solid #FECACA;
      border-radius: 9px;
      padding: 11px 14px;
      font-size: 13px;
      margin-top: 14px;
      text-align: center;
      animation: shake 0.35s ease;
    }
    @keyframes shake {
      0%,100%{transform:translateX(0)}
      20%{transform:translateX(-6px)}
      40%{transform:translateX(6px)}
      60%{transform:translateX(-4px)}
      80%{transform:translateX(4px)}
    }

    /* ── Footer link ── */
    .card-footer {
      padding: 0 36px 28px;
      text-align: center;
    }
    .card-footer a {
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: color 0.15s;
    }
    .card-footer a:hover { color: var(--brand); }
    .card-footer a i { font-size: 15px; }

    @media (max-width: 440px) {
      .card-top, .card-body { padding-left: 24px; padding-right: 24px; }
      .card-footer { padding-left: 24px; padding-right: 24px; }
    }
  </style>
</head>
<body>

<div class="login-card">

  <!-- Top dark header -->
  <div class="card-top">
    <div class="logo-badge">
      <img src="logo-icon.png" alt="AW">
    </div>
    <h1>Admin Access</h1>
    <p>Arcgate Walkathon 2026 · Organizers only</p>
  </div>

  <!-- Form -->
  <div class="card-body">
    <div class="field">
      <label>Email address</label>
      <div class="input-wrap">
        <i class="ti ti-mail"></i>
        <input type="email" id="email" placeholder="you@arcgate.com" autocomplete="username">
      </div>
    </div>
    <div class="field">
      <label>Password</label>
      <div class="input-wrap">
        <i class="ti ti-lock"></i>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>
    </div>

    <button class="btn-login" id="login-btn">
      <i class="ti ti-shield-check"></i> Sign in
    </button>

    <div class="error-msg" id="err">
      <i class="ti ti-alert-circle"></i> Invalid email or password
    </div>
  </div>

  <div class="card-footer">
    <a href="index.html"><i class="ti ti-arrow-left"></i> Back to participant portal</a>
  </div>

</div>

<script>
  // Redirect if already logged in
  var s = JSON.parse(sessionStorage.getItem('wk_admin') || '{}');
  if (s.loggedIn && s.expires > Date.now() && (s.role === 'admin' || s.manualAdmin === true)) {
    window.location.href = 'admin.html';
  }

  function tryLogin() {
    var email = document.getElementById('email').value.trim().toLowerCase();
    var pass  = document.getElementById('password').value;
    var btn   = document.getElementById('login-btn');
    var err   = document.getElementById('err');

    if (!email || !pass) {
      err.style.display = 'block';
      err.innerHTML = '<i class="ti ti-alert-circle"></i> Please enter your email and password';
      return;
    }

    btn.classList.add('loading');
    btn.innerHTML = '<i class="ti ti-loader" style="animation:spin .8s linear infinite"></i> Signing in…';

    // Small delay for UX feel
    setTimeout(function() {
      var token = btoa(email + ':' + pass);
      if (token === 'cHJhQGFyY2dhdGUuY29tOlByYWthc2hAMTIz') {
        sessionStorage.setItem('wk_admin', JSON.stringify({
          loggedIn:    true,
          role:        'admin',
          manualAdmin: true,
          name:        'Manual Admin',
          expires:     Date.now() + 8 * 60 * 60 * 1000
        }));
        window.location.href = 'admin.html';
      } else {
        btn.classList.remove('loading');
        btn.innerHTML = '<i class="ti ti-shield-check"></i> Sign in';
        err.style.display = 'block';
        err.innerHTML = '<i class="ti ti-alert-circle"></i> Invalid email or password';
        // Re-trigger animation
        err.style.animation = 'none';
        err.offsetHeight;
        err.style.animation = '';
      }
    }, 400);
  }

  document.getElementById('login-btn').addEventListener('click', tryLogin);
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') tryLogin();
  });

  // @keyframes spin for loading icon
  var style = document.createElement('style');
  style.textContent = '@keyframes spin{to{transform:rotate(360deg)}}';
  document.head.appendChild(style);
</script>
</body>
</html>
