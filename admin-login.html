<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Arcgate Walkathon 2026</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1A1A1A; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .wrap { width: 100%; max-width: 420px; padding: 20px; }
    .logo-wrap { text-align: center; margin-bottom: 24px; background: white; border-radius: 12px; padding: 14px 24px; }
    .logo-wrap img { height: 44px; object-fit: contain; display: block; margin: 0 auto; }
    .card { background: white; border-radius: 16px; padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
    .icon-wrap { width: 52px; height: 52px; background: #E8622A; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; margin: 0 auto 16px; }
    h1 { text-align: center; font-size: 22px; color: #1A1A1A; margin-bottom: 4px; }
    .sub { text-align: center; font-size: 13px; color: #999; margin-bottom: 28px; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 7px; font-weight: 600; }
    .field input { width: 100%; padding: 11px 14px; border: 1px solid #e8e8e8; border-radius: 8px; font-size: 15px; color: #1A1A1A; transition: border 0.15s; background: #fafafa; }
    .field input:focus { outline: none; border-color: #E8622A; background: white; }
    .btn-login { width: 100%; padding: 13px; background: #E8622A; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; transition: background 0.2s; }
    .btn-login:hover { background: #d4561f; }
    .error-msg { display: none; background: #ffebee; color: #c62828; border-radius: 8px; padding: 12px 16px; font-size: 13px; margin-top: 16px; text-align: center; }
    .footer { text-align: center; margin-top: 20px; font-size: 12px; }
    .footer a { color: #E8622A; text-decoration: none; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo-wrap"><img src="aw_logo.jpg" alt="Arcgate Walkathon 2026"></div>
  <div class="card">
    <div class="icon-wrap">🛡️</div>
    <h1>Admin Access</h1>
    <p class="sub">Restricted to event organizers only</p>
    <div class="field"><label>Email</label><input type="email" id="email" autocomplete="off"></div>
    <div class="field"><label>Password</label><input type="password" id="password"></div>
    <button class="btn-login" id="login-btn">Sign in</button>
    <div class="error-msg" id="err">❌ Invalid email or password</div>
  </div>
  <div class="footer"><a href="index.html">← Back to home</a></div>
</div>
<script>
  var s = JSON.parse(sessionStorage.getItem('wk_admin') || '{}');
  if (s.loggedIn && s.expires > Date.now() && (s.role === 'admin' || s.manualAdmin === true)) {
    window.location.href = 'admin.html';
  }

  document.getElementById('login-btn').addEventListener('click', function() {
    var email = document.getElementById('email').value.trim().toLowerCase();
    var pass  = document.getElementById('password').value;
    var token = btoa(email + ':' + pass);
    if (token === 'cHJhQGFyY2dhdGUuY29tOlByYWthc2hAMTIz') {
      sessionStorage.setItem('wk_admin', JSON.stringify({
        loggedIn: true,
        role: 'admin',
        manualAdmin: true,
        name: 'Manual Admin',
        expires: Date.now() + 8 * 60 * 60 * 1000
      }));
      window.location.href = 'admin.html';
    } else {
      document.getElementById('err').style.display = 'block';
    }
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('login-btn').click();
  });
</script>
</body>
</html>
