<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#111827">
  <title>My Dashboard — Arcgate Walkathon 2026</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand:#E8622A; --brand-dark:#c4511f;
      --dark:#111827; --bg:#F4F5F7; --white:#fff;
      --border:#E8EAED; --text:#1A1A1A; --muted:#6B7280;
      --green:#2e7d32; --green-bg:#e8f5e9;
      --red:#c62828; --red-bg:#ffebee;
      --blue:#1565c0; --blue-bg:#e3f2fd;
      --purple:#6a1b9a; --purple-bg:#f3e5f5;
      --radius:14px; --radius-sm:10px;
      --shadow:0 1px 3px rgba(0,0,0,0.07),0 4px 12px rgba(0,0,0,0.05);
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;}
    body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
         background:var(--bg);color:var(--text);display:flex;flex-direction:column;
         min-height:100dvh;-webkit-font-smoothing:antialiased;}

    /* ── Header ── */
    .header{background:var(--white);border-bottom:2px solid var(--brand);
            padding:12px 20px;padding-top:max(12px,env(safe-area-inset-top));
            display:flex;align-items:center;justify-content:space-between;
            position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
    .header img{height:36px;object-fit:contain;}
    .header-right{display:flex;align-items:center;gap:8px;}
    .refresh-btn{background:none;border:none;cursor:pointer;padding:8px;border-radius:8px;
                 color:var(--muted);display:flex;align-items:center;justify-content:center;
                 transition:background 0.15s;}
    .refresh-btn:hover{background:#f0f0f0;}
    .refresh-btn svg{width:18px;height:18px;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .spinning{animation:spin 1s linear infinite;}
    .sign-out-btn{font-size:13px;color:var(--muted);background:none;border:none;
                  cursor:pointer;padding:7px 12px;border-radius:8px;font-family:inherit;
                  font-weight:500;transition:background 0.15s;}
    .sign-out-btn:hover{background:#f0f0f0;color:var(--text);}

    /* ── Profile hero ── */
    .profile-hero{background:var(--dark);color:white;padding:20px 20px 0;
                  position:relative;overflow:hidden;}
    .profile-hero::after{content:\'\';position:absolute;top:-40px;right:-40px;
                          width:160px;height:160px;border-radius:50%;
                          background:radial-gradient(circle,rgba(232,98,42,0.25) 0%,transparent 70%);
                          pointer-events:none;}
    .profile-name{font-size:22px;font-weight:800;letter-spacing:-0.3px;margin-bottom:6px;}
    .profile-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
    .tag{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);
         color:rgba(255,255,255,0.75);font-size:11px;font-weight:500;padding:4px 10px;
         border-radius:20px;letter-spacing:0.2px;}

    /* ── Stats strip (orange, pinned below hero) ── */
    .stats-strip{background:var(--brand);display:grid;grid-template-columns:repeat(4,1fr);}
    .stat-cell{padding:12px 8px;text-align:center;border-right:1px solid rgba(255,255,255,0.2);}
    .stat-cell:last-child{border-right:none;}
    .stat-cell .sv{font-size:18px;font-weight:800;color:white;line-height:1;}
    .stat-cell .sl{font-size:9px;text-transform:uppercase;letter-spacing:0.5px;
                   color:rgba(255,255,255,0.65);margin-top:3px;}

    /* ── Content ── */
    .content{flex:1;padding:16px;max-width:640px;width:100%;margin:0 auto;}

    /* ── Activity cards (mobile-first, no horizontal scroll) ── */
    .section-title{font-size:13px;font-weight:700;color:var(--muted);
                   text-transform:uppercase;letter-spacing:0.6px;
                   margin:4px 0 12px;}
    #act-list{display:grid;gap:10px;}
    .act-card{background:var(--white);border-radius:var(--radius);
              box-shadow:var(--shadow);overflow:hidden;}
    .act-card-head{padding:12px 14px 10px;border-bottom:1px solid var(--border);
                   display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
    .act-name{font-size:14px;font-weight:700;color:var(--text);
              text-decoration:none;line-height:1.3;flex:1;}
    .act-name:hover{color:var(--brand);}
    .act-badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;
               flex-shrink:0;margin-top:1px;}
    .act-grid{display:grid;grid-template-columns:repeat(3,1fr);padding:10px 14px;gap:8px;}
    .act-stat{text-align:center;}
    .act-stat .av{font-size:14px;font-weight:700;color:var(--text);}
    .act-stat .al{font-size:10px;color:var(--muted);margin-top:1px;}
    .act-footer{padding:8px 14px;background:#FAFBFC;border-top:1px solid var(--border);
                display:flex;align-items:center;justify-content:space-between;}
    .act-date{font-size:11px;color:var(--muted);}
    .act-status-badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;}

    /* badges */
    .badge-walk{background:var(--green-bg);color:var(--green);}
    .badge-run{background:var(--blue-bg);color:var(--blue);}
    .badge-ride{background:#fff3e0;color:#e65100;}
    .badge-hike{background:var(--purple-bg);color:var(--purple);}
    .badge-clean{background:var(--green-bg);color:var(--green);}
    .badge-flag{background:var(--red-bg);color:var(--red);}

    /* ── Loading skeleton ── */
    @keyframes shimmer{0%{background-position:-200px 0}100%{background-position:200px 0}}
    .skeleton{background:linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%);
               background-size:400px 100%;animation:shimmer 1.4s ease infinite;
               border-radius:6px;}
    .skel-card{background:var(--white);border-radius:var(--radius);
               box-shadow:var(--shadow);padding:14px;margin-bottom:10px;}
    .skel-line{height:14px;margin-bottom:8px;}
    .skel-line.short{width:40%;}
    .skel-line.medium{width:65%;}
    .skel-line.full{width:100%;}

    /* ── Empty / error states ── */
    .empty-state{text-align:center;padding:48px 24px;color:var(--muted);}
    .empty-state .icon{font-size:40px;margin-bottom:12px;}
    .empty-state p{font-size:14px;line-height:1.6;}

    /* ── Flagged info banner ── */
    .flagged-info{background:#fff8f6;border:1px solid rgba(232,98,42,0.25);
                  border-radius:var(--radius-sm);padding:12px 14px;
                  margin-bottom:14px;font-size:12px;color:#7c3a1a;line-height:1.55;
                  display:none;}
    .flagged-info strong{color:var(--brand);}

    /* ── Footer / bottom nav ── */
    .bottom-nav{background:var(--white);border-top:1px solid var(--border);
                display:grid;grid-template-columns:1fr 1fr;
                padding-bottom:max(12px,env(safe-area-inset-bottom));
                position:sticky;bottom:0;z-index:100;}
    .bnav-item{display:flex;flex-direction:column;align-items:center;
               padding:10px 8px 4px;text-decoration:none;
               color:var(--muted);font-size:10px;font-weight:600;
               letter-spacing:0.3px;text-transform:uppercase;gap:4px;
               transition:color 0.15s;}
    .bnav-item svg{width:22px;height:22px;}
    .bnav-item.active{color:var(--brand);}
    .bnav-item:hover{color:var(--brand);}

    /* ── Tablet/desktop upgrade ── */
    /* Points breakdown — compact single row */
    .act-pts-breakdown{border-top:1px solid var(--border);padding:6px 14px;
                        background:#FAFBFC;display:flex;align-items:center;
                        gap:0;overflow:hidden;}
    .pts-cell{display:flex;flex-direction:column;align-items:center;
               flex:1;padding:0 6px;border-right:1px solid var(--border);}
    .pts-cell:last-child{border-right:none;}
    .pts-cell .pc-lbl{font-size:9px;text-transform:uppercase;letter-spacing:0.4px;
                       color:var(--muted);margin-bottom:1px;white-space:nowrap;}
    .pts-cell .pc-val{font-size:13px;font-weight:800;white-space:nowrap;}
    .pts-cell.dist  .pc-val{color:#4338CA;}
    .pts-cell.bonus .pc-val{color:#C2410C;}
    .pts-cell.chall .pc-val{color:#15803D;}
    .pts-cell.total .pc-val{color:var(--dark);}
    .pts-cell.total{background:none;}
    .ch-tag{font-size:9px;color:#15803D;background:#F0FDF4;
             padding:1px 5px;border-radius:8px;margin-top:1px;
             max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

    @media(min-width:640px){
      .profile-hero{padding:24px 32px 0;}
      .profile-name{font-size:26px;}
      .content{padding:20px 24px;}
      .act-grid{grid-template-columns:repeat(6,1fr);}
    }
  </style>
</head>
<body>

<header class="header">
  <img src="aw_logo.jpg" alt="Arcgate Walkathon 2026">
  <div class="header-right">
    <button class="refresh-btn" id="refresh-btn" onclick="refreshData()" title="Refresh">
      <svg id="refresh-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 4v6h6"/><path d="M23 20v-6h-6"/>
        <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
      </svg>
    </button>
    <button class="sign-out-btn" onclick="logout()">Sign out</button>
  </div>
</header>

<div class="profile-hero" id="profile-hero">
  <div class="profile-name" id="p-name">Loading...</div>
  <div class="profile-tags" id="p-tags"></div>
</div>
<div class="stats-strip">
  <div class="stat-cell"><div class="sv" id="s-rank">—</div><div class="sl">My Rank</div></div>
  <div class="stat-cell"><div class="sv" id="s-dist">—</div><div class="sl">Valid km</div></div>
  <div class="stat-cell"><div class="sv" id="s-acts">—</div><div class="sl">Activities</div></div>
  <div class="stat-cell"><div class="sv" id="s-pts">—</div><div class="sl">Points</div></div>
</div>

<div class="content">
  <div class="flagged-info" id="flagged-banner">
    <strong>⚑ Flagged activities</strong> — Some activities were flagged for admin review
    (unusual distance or pace). They\'re excluded from your leaderboard score until reviewed.
    Contact your event admin if you have questions.
  </div>
  <div class="section-title" id="act-section-title">My Activities</div>
  <div id="act-list">
    <div class="skel-card"><div class="skeleton skel-line full"></div><div class="skeleton skel-line medium"></div><div class="skeleton skel-line short"></div></div>
    <div class="skel-card"><div class="skeleton skel-line full"></div><div class="skeleton skel-line medium"></div><div class="skeleton skel-line short"></div></div>
    <div class="skel-card"><div class="skeleton skel-line full"></div><div class="skeleton skel-line medium"></div><div class="skeleton skel-line short"></div></div>
  </div>
</div>

<nav class="bottom-nav">
  <a class="bnav-item active" href="participant.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
    </svg>
    Dashboard
  </a>
  <a class="bnav-item" href="participant-leaderboard.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/>
      <line x1="6" y1="20" x2="6" y2="14"/>
    </svg>
    Leaderboard
  </a>
</nav>

<script>
var SUPABASE_URL = 'https://jhdgkncpkrttvemvwukc.supabase.co';
var CONFIG_LB    = { basePer_km: 1, bonus: [{km:5,points:1},{km:8,points:2},{km:10,points:3},{km:15,points:4},{km:21,points:7}] };
var CHALLENGES_LB   = [];
var SPECIAL_DAYS_LB = [];
var ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpoZGdrbmNwa3J0dHZlbXZ3dWtjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NzgyNjMsImV4cCI6MjA5NzI1NDI2M30.d7mvXOYDq5G4aqs1Mbc6HFNgTBlQk4B6ah0eahE_yZE';
var HDR = { apikey: ANON, Authorization: 'Bearer ' + ANON };

function userGuard() {
  var s = JSON.parse(sessionStorage.getItem('wk_user') || '{}');
  if (!s.loggedIn || s.expires < Date.now() || !s.athleteId) {
    window.location.href = 'index.html'; return null;
  }
  return s;
}
function logout() {
  sessionStorage.removeItem('wk_user');
  sessionStorage.removeItem('wk_admin');
  window.location.href = 'index.html';
}
function esc(v) {
  return String(v == null ? '' : v).replace(/[&<>"']/g, function(c) {
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'": '&#39;'}[c];
  });
}
function fmtDate(d) {
  return new Date(d).toLocaleDateString('en-IN', {day:'2-digit',month:'short',year:'numeric'});
}
function fmtTime(d) {
  return new Date(d).toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit',hour12:true});
}
function fmtDur(s) {
  var h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
  return h > 0 ? h + 'h ' + m + 'm' : m + 'm';
}
function fmtPS(ms, t) {
  if (!ms) return '—';
  if (t === 'Ride' || t === 'VirtualRide' || t === 'MountainBikeRide')
    return (ms * 3.6).toFixed(1) + ' km/h';
  var p = 1000 / ms, min = Math.floor(p / 60), sec = Math.round(p % 60);
  return min + ':' + sec.toString().padStart(2, '0') + '/km';
}
function badgeClass(t) {
  if (t === 'Walk') return 'badge-walk';
  if (t === 'Run' || t === 'VirtualRun') return 'badge-run';
  if (t === 'Ride' || t === 'VirtualRide' || t === 'MountainBikeRide') return 'badge-ride';
  return 'badge-hike';
}
function friendlyFlag(reason) {
  if (!reason) return 'Under review';
  if (reason.toLowerCase().indexOf('distance') > -1) return 'Distance out of range';
  if (reason.toLowerCase().indexOf('pace') > -1) return 'Pace out of range';
  if (reason.toLowerCase().indexOf('manual') > -1) return 'Admin review';
  return 'Under review';
}
// Bonus calc — exact match to admin leaderboard CONFIG
function calcBonus(km) {
  var result = 0;
  var sorted = CONFIG_LB.bonus.slice().sort(function(a,b){ return b.km - a.km; });
  for (var i = 0; i < sorted.length; i++) {
    if (km >= Number(sorted[i].km)) { result = Number(sorted[i].points || sorted[i].pts || 0); break; }
  }
  return result;
}

// Full points breakdown for one athlete — mirrors admin calcPoints exactly
// ── checkChallenge: exact port from admin leaderboard ──
function checkChallengeSingle(act, ch, cSports) {
  var actDate = (act.activity_date || '').split('T')[0];
  // date window
  if (actDate < ch.start_date || actDate > ch.end_date) return false;
  // sport type
  if (cSports.indexOf(act.sport_type) === -1) return false;
  var km = (act.distance_meters || 0) / 1000;
  // distance
  if (ch.distance_type === 'fixed' || ch.distance_type === 'range') {
    if (km < ch.distance_min - 0.1 || km > ch.distance_max + 0.1) return false;
  } else { // extended (min+)
    if (km < ch.distance_min) return false;
  }
  // elevation
  if ((ch.elevation_criteria || 0) > 0 && (act.elevation_gain || 0) < ch.elevation_criteria) return false;
  // start time (skip imported placeholder 06:30:00)
  if (ch.start_time_criteria && act.activity_date && act.activity_date.indexOf('T') > -1) {
    var timeStr = act.activity_date.split('T')[1] || '';
    if (!timeStr.startsWith('06:30:00')) {
      var actTime = new Date(act.activity_date);
      var actMins = actTime.getHours() * 60 + actTime.getMinutes();
      var parts   = ch.start_time_criteria.split(':');
      var critMins = parseInt(parts[0]) * 60 + parseInt(parts[1] || 0);
      if (Math.abs(actMins - critMins) > 30) return false;
    }
  }
  return true;
}

function calcFullPts(myActs, gender) {
  // Build per-day map of valid (non-flagged) activities
  var byDay = {};
  myActs.filter(function(a){ return !a.is_flagged; }).forEach(function(a) {
    var d = (a.activity_date || '').split('T')[0];
    if (!d) return;
    if (!byDay[d]) byDay[d] = [];
    byDay[d].push(a);
  });

  var totalDistKm = 0, totalDistPts = 0, totalBonus = 0, totalChallenge = 0;
  var earnedChallenges = {};
  // dayBreakdown: { date: { km, distPts, bonusPts, challenges: [{name, pts}] } }
  var dayBreakdown = {};
  // actBreakdown: { strava_activity_id: { challenges: [{name, pts}] } }
  var actBreakdown = {};

  // ── Per-day distance + bonus ──────────────────────────────────────────────
  for (var day in byDay) {
    var dayKm = 0;
    byDay[day].forEach(function(a){ dayKm += (parseFloat(a.distance_meters) || 0) / 1000; });
    dayKm = parseFloat(dayKm.toFixed(4));
    var isSpecial = SPECIAL_DAYS_LB.indexOf(day) !== -1;
    if (!isSpecial && dayKm > 21) dayKm = 21;
    dayKm = parseFloat(dayKm.toFixed(4));
    var base = parseFloat(CONFIG_LB.basePer_km) || 1;
    var dPts = parseFloat((dayKm * base).toFixed(2));
    var bPts = calcBonus(dayKm);
    totalDistKm  += dayKm;
    totalDistPts += dPts;
    totalBonus   += bPts;
    dayBreakdown[day] = { km: dayKm, distPts: dPts, bonusPts: bPts, challenges: [] };
  }
  totalDistKm  = parseFloat(totalDistKm.toFixed(2));
  totalDistPts = parseFloat(totalDistPts.toFixed(2));

  // ── Challenges ────────────────────────────────────────────────────────────
  for (var ci = 0; ci < CHALLENGES_LB.length; ci++) {
    var ch = CHALLENGES_LB[ci];
    var key = 'ch_' + (ch.id || ci);
    if (earnedChallenges[key]) continue;

    // Eligibility check
    var g = (gender || '').toLowerCase();
    var eligible = ch.eligible === 'all'
      || ch.eligible === g
      || ch.eligible === 'dayshift'
      || ch.eligible === 'nightshift';
    if (!eligible) continue;

    var cSports = (Array.isArray(ch.sport_types) && ch.sport_types.length)
      ? ch.sport_types : ['Walk', 'Run', 'Hike', 'Ride'];
    var chPts = Number(ch.bonus_points) || 0;
    var chName = ch.name || 'Challenge';
    var awarded = false;
    var awardedDay = null;
    var awardedActId = null;

    if (ch.activity_scope === 'daily') {
      // ── Daily scope: total km for the day must qualify ──
      for (var day in byDay) {
        if (awarded) break;
        // Check date window (+ IST UTC+1 offset)
        var next = new Date(day + 'T00:00:00Z');
        next.setDate(next.getDate() + 1);
        var nStr = next.toISOString().split('T')[0];
        var inRange = (day >= ch.start_date && day <= ch.end_date) ||
                      (nStr >= ch.start_date && nStr <= ch.end_date);
        if (!inRange) continue;

        var dActs = byDay[day];
        var hasSport = dActs.some(function(a){ return cSports.indexOf(a.sport_type) > -1; });
        if (!hasSport) continue;

        var dKm = 0;
        dActs.forEach(function(a){
          if (cSports.indexOf(a.sport_type) > -1) dKm += (a.distance_meters || 0) / 1000;
        });

        if (ch.distance_type === 'fixed' || ch.distance_type === 'range') {
          awarded = dKm >= ch.distance_min - 0.1 && dKm <= ch.distance_max + 0.1;
        } else {
          awarded = dKm >= ch.distance_min;
        }
        if (awarded) awardedDay = day;
      }

    } else {
      // ── Single activity scope: each activity checked individually ──
      var validActs = myActs.filter(function(a){ return !a.is_flagged; });
      for (var ai = 0; ai < validActs.length; ai++) {
        if (awarded) break;
        var a = validActs[ai];
        if (checkChallengeSingle(a, ch, cSports)) {
          awarded = true;
          awardedActId = a.strava_activity_id;
          awardedDay   = (a.activity_date || '').split('T')[0];
        }
      }
    }

    if (awarded) {
      earnedChallenges[key] = true;
      totalChallenge += chPts;
      // Store on the triggering day AND activity
      if (awardedDay && dayBreakdown[awardedDay]) {
        dayBreakdown[awardedDay].challenges.push({ name: chName, pts: chPts, actId: awardedActId });
      }
      if (awardedActId) {
        if (!actBreakdown[awardedActId]) actBreakdown[awardedActId] = { challenges: [] };
        actBreakdown[awardedActId].challenges.push({ name: chName, pts: chPts });
      }
    }
  }

  // ── Manual bonus (per activity) ───────────────────────────────────────────
  myActs.filter(function(a){ return !a.is_flagged && parseFloat(a.manual_bonus) > 0; }).forEach(function(a){
    var mb = parseFloat(a.manual_bonus);
    totalChallenge += mb;
    var day = (a.activity_date || '').split('T')[0];
    if (dayBreakdown[day]) {
      dayBreakdown[day].challenges.push({ name: 'Manual bonus', pts: mb, actId: a.strava_activity_id });
    }
    if (!actBreakdown[a.strava_activity_id]) actBreakdown[a.strava_activity_id] = { challenges: [] };
    actBreakdown[a.strava_activity_id].challenges.push({ name: 'Manual bonus', pts: mb });
  });

  totalChallenge = parseFloat(totalChallenge.toFixed(2));

  return {
    km:          totalDistKm,
    distPts:     totalDistPts,
    bonusPts:    totalBonus,
    challengePts: totalChallenge,
    total:       parseFloat((totalDistPts + totalBonus + totalChallenge).toFixed(2)),
    dayBreakdown: dayBreakdown,
    actBreakdown: actBreakdown
  };
}

async function fetchAll(url) {
  var all = [], from = 0, ps = 1000;
  while (true) {
    var sep = url.indexOf('?') > -1 ? '&' : '?';
    var r = await fetch(url + sep + 'limit=' + ps + '&offset=' + from, {
      headers: Object.assign({}, HDR, {'Range-Unit':'items','Range':from+'-'+(from+ps-1)})
    });
    if (!r.ok) break;
    var page = await r.json();
    if (!Array.isArray(page) || !page.length) break;
    all = all.concat(page);
    if (page.length < ps) break;
    from += ps;
  }
  return all;
}

function renderIcon(type) {
  var icons = { Walk:'🚶', Run:'🏃', VirtualRun:'🏃', Ride:'🚴',
    VirtualRide:'🚴', MountainBikeRide:'🚵', Hike:'🥾' };
  return icons[type] || '⚡';
}

function renderActivities(acts, dayBreakdown, actBreakdown, gender) {
  dayBreakdown = dayBreakdown || {};
  actBreakdown = actBreakdown || {};
  if (!acts.length) {
    document.getElementById('act-list').innerHTML =
      '<div class="empty-state"><div class="icon">🏃</div>' +
      '<p>No activities yet.<br>Save a walk or run on Strava and it will appear here within 30 seconds.</p></div>';
    return;
  }
  var flaggedCount = acts.filter(function(a){ return a.is_flagged; }).length;
  if (flaggedCount > 0) document.getElementById('flagged-banner').style.display = 'block';

  var shownDays = {};
  var html = acts.map(function(a) {
    var dist = a.distance_meters ? (a.distance_meters / 1000).toFixed(2) + ' km' : '—';
    var dur = a.moving_time_seconds ? fmtDur(a.moving_time_seconds) : '—';
    var ps = fmtPS(a.avg_speed, a.sport_type);
    var elev = a.elevation_gain ? a.elevation_gain.toFixed(0) + ' m' : '—';
    var actUrl = 'https://www.strava.com/activities/' + a.strava_activity_id;
    var bc = badgeClass(a.sport_type);
    var isFlag = a.is_flagged;
    return '<div class="act-card">' +
      '<div class="act-card-head">' +
        '<a class="act-name" href="' + actUrl + '" target="_blank">' +
          renderIcon(a.sport_type) + ' ' + esc(a.activity_name || 'Activity') + '</a>' +
        '<span class="act-badge ' + bc + '">' + esc(a.sport_type || '—') + '</span>' +
      '</div>' +
      '<div class="act-grid">' +
        '<div class="act-stat"><div class="av">' + dist + '</div><div class="al">Distance</div></div>' +
        '<div class="act-stat"><div class="av">' + dur + '</div><div class="al">Duration</div></div>' +
        '<div class="act-stat"><div class="av">' + ps + '</div><div class="al">' +
          (a.sport_type === 'Ride' || a.sport_type === 'VirtualRide' ? 'Speed' : 'Pace') + '</div></div>' +
        '<div class="act-stat"><div class="av">' + elev + '</div><div class="al">Elevation</div></div>' +
      '</div>' +
      (function() {
        if (a.is_flagged) return '';
        var actDay = (a.activity_date || '').split('T')[0];
        var db  = dayBreakdown[actDay];
        var ab  = actBreakdown[a.strava_activity_id] || { challenges: [] };
        if (!db) return '';

        // Challenge pts for this activity:
        // 1. single-scope: earned by THIS specific activity
        // 2. daily-scope: earned by the day this activity belongs to (show on first act of day only)
        var chPts = 0;
        var chNames = [];

        // Single-scope challenges on this activity
        ab.challenges.forEach(function(ch) { chPts += ch.pts; chNames.push(ch.name); });

        // Daily-scope challenges — only on FIRST activity of that day
        var isDayFirst = !shownDays[actDay];
        if (isDayFirst) {
          shownDays[actDay] = true;
          db.challenges
            .filter(function(ch){ return !ch.actId; })
            .forEach(function(ch){ chPts += ch.pts; chNames.push(ch.name); });
        }

        var dayTotal = db.distPts + db.bonusPts + chPts;

        var chTag = chNames.length
          ? '<div class="ch-tag" title="' + chNames.map(esc).join(', ') + '">' + chNames.map(esc).join(', ') + '</div>'
          : '';
        return '<div class="act-pts-breakdown">' +
          '<div class="pts-cell dist">' +
            '<span class="pc-lbl">Dist</span>' +
            '<span class="pc-val">' + db.distPts.toFixed(2) + '</span>' +
          '</div>' +
          '<div class="pts-cell bonus">' +
            '<span class="pc-lbl">Bonus</span>' +
            '<span class="pc-val">+' + db.bonusPts + '</span>' +
          '</div>' +
          '<div class="pts-cell chall">' +
            '<span class="pc-lbl">Challenge</span>' +
            '<span class="pc-val">+' + chPts.toFixed(2) + '</span>' +
            chTag +
          '</div>' +
          '<div class="pts-cell total">' +
            '<span class="pc-lbl">Total</span>' +
            '<span class="pc-val">' + dayTotal.toFixed(2) + '</span>' +
          '</div>' +
        '</div>';
      })() +
      '<div class="act-footer">' +
        '<span class="act-date">' + fmtDate(a.activity_date) + ' · ' + fmtTime(a.activity_date) + '</span>' +
        '<span class="act-status-badge ' + (isFlag ? 'badge-flag' : 'badge-clean') + '">' +
          (isFlag ? '⚑ ' + friendlyFlag(a.flag_reason) : '✓ Valid') + '</span>' +
      '</div>' +
    '</div>';
  }).join('');
  document.getElementById('act-list').innerHTML = html;
}

var currentSession = null;

async function load() {
  var s = userGuard();
  if (!s) return;
  currentSession = s;
  var athleteId = s.athleteId;

  try {
    var [regRes, myActs, allActs, cfgRes, chRes, sdRes] = await Promise.all([
      fetch(SUPABASE_URL + '/rest/v1/registration?strava_athlete_id=eq.' + athleteId + '&select=*', {headers: HDR}),
      fetchAll(SUPABASE_URL + '/rest/v1/activities?strava_athlete_id=eq.' + athleteId + '&is_deleted=eq.false&order=activity_date.desc'),
      fetchAll(SUPABASE_URL + '/rest/v1/activities?is_flagged=eq.false&is_deleted=eq.false&select=strava_athlete_id,distance_meters,activity_date'),
      fetch(SUPABASE_URL + '/rest/v1/leaderboard_config?select=config_key,config_value', {headers: HDR}),
      fetch(SUPABASE_URL + '/rest/v1/challenges?is_active=eq.true&select=*', {headers: HDR}),
      fetch(SUPABASE_URL + '/rest/v1/special_scoring_days?select=special_date', {headers: HDR})
    ]);
    var cfgRows = await cfgRes.json();
    if (Array.isArray(cfgRows)) cfgRows.forEach(function(row) {
      if (row.config_key === 'bonus_points') CONFIG_LB.bonus = row.config_value.map(function(b){ return {km:Number(b.km),points:Number(b.points||b.pts||0)}; });
      if (row.config_key === 'base_points_per_km') CONFIG_LB.basePer_km = parseFloat(row.config_value) || 1;
    });
    var chRows = await chRes.json();
    CHALLENGES_LB = Array.isArray(chRows) ? chRows : [];
    var sdRows = await sdRes.json();
    SPECIAL_DAYS_LB = Array.isArray(sdRows) ? sdRows.map(function(x){ return x.special_date; }) : [];

    var regs = await regRes.json();
    var reg = Array.isArray(regs) && regs.length ? regs[0] : {};
    var name = reg.full_name || s.name || 'Participant';

    // Profile
    document.getElementById('p-name').textContent = name;
    var tags = [];
    if (reg.leaderboard_team) tags.push('🏙️ ' + reg.leaderboard_team);
    if (reg.gender) tags.push(reg.gender === 'Female' ? '👩 Female' : '👨 Male');
    if (reg.shift) tags.push('⏰ ' + reg.shift);
    document.getElementById('p-tags').innerHTML = tags.map(function(t) {
      return '<span class="tag">' + esc(t) + '</span>';
    }).join('');

    // Stats
    var valid = myActs.filter(function(a) { return !a.is_flagged; });
    var dist = valid.reduce(function(sum, a) { return sum + (a.distance_meters || 0); }, 0) / 1000;

    // Full points calculation — exact match to admin leaderboard
    var fullPts = calcFullPts(myActs, reg.gender);
    var totalPts = fullPts.total;

    // Rank calculation
    var totals = {};
    allActs.forEach(function(a) {
      totals[a.strava_athlete_id] = (totals[a.strava_athlete_id] || 0) + (a.distance_meters || 0);
    });
    var ranked = Object.entries(totals).sort(function(a, b) { return b[1] - a[1]; });
    var rank = ranked.findIndex(function(x) { return String(x[0]) === String(athleteId); }) + 1;

    document.getElementById('s-rank').textContent = rank > 0 ? '#' + rank : '—';
    document.getElementById('s-dist').textContent = fullPts.km.toFixed(1);
    document.getElementById('s-acts').textContent = valid.length;
    document.getElementById('s-pts').textContent = fullPts.total.toFixed(1);

    // Section title
    var flaggedCount = myActs.filter(function(a) { return a.is_flagged; }).length;
    document.getElementById('act-section-title').textContent =
      myActs.length + ' Activities' + (flaggedCount ? ' · ' + flaggedCount + ' Flagged' : '');

    renderActivities(myActs, fullPts.dayBreakdown, fullPts.actBreakdown, reg.gender);
  } catch(e) {
    document.getElementById('act-list').innerHTML =
      '<div class="empty-state"><div class="icon">⚠️</div><p>Could not load activities.<br>Check your connection and refresh.</p></div>';
    console.error(e);
  }
}

function refreshData() {
  var icon = document.getElementById('refresh-icon');
  icon.classList.add('spinning');
  // Reset
  document.getElementById('act-list').innerHTML =
    '<div class="skel-card"><div class="skeleton skel-line full"></div><div class="skeleton skel-line medium"></div></div>' +
    '<div class="skel-card"><div class="skeleton skel-line full"></div><div class="skeleton skel-line medium"></div></div>';
  document.getElementById('flagged-banner').style.display = 'none';
  load().finally(function() { icon.classList.remove('spinning'); });
}

load();
</script>
