<style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    :root{
      --brand:#E8622A; --brand-dim:rgba(232,98,42,0.15);
      --bg:#0A0C10; --surface:#181C28; --surface2:#22273A;
      --border:rgba(255,255,255,0.10);
      --text:#FFFFFF; --muted:rgba(255,255,255,0.52); --label:rgba(255,255,255,0.35); --dim:rgba(255,255,255,0.20);
      --green:#22C55E; --green-dim:rgba(34,197,94,0.12);
      --blue:#60A5FA; --blue-dim:rgba(96,165,250,0.12);
      --purple:#A78BFA; --purple-dim:rgba(167,139,250,0.12);
      --gold:#FFD000; --gold-dim:rgba(255,208,0,0.15);
      --silver:#C8D8E8; --bronze:#F4A84A;
      --radius:18px; --radius-sm:14px; --radius-xs:10px;
      --font:'Inter',-apple-system,sans-serif;
    }
    html,body{height:100%;}
    body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;flex-direction:column;min-height:100dvh;-webkit-font-smoothing:antialiased;}

    /* ── Header ── */
    .header{
      position:sticky;top:0;z-index:200;
      background:var(--bg);
      border-bottom:1px solid var(--border);
      padding:max(14px,env(safe-area-inset-top)) 18px 14px;
      display:flex;align-items:center;justify-content:space-between;
    }
    .header-logo{display:flex;align-items:center;gap:9px;}
    .header-logo-icon{width:32px;height:32px;border-radius:9px;background:var(--brand);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .header-logo-icon img{width:22px;height:22px;object-fit:contain;filter:brightness(0) invert(1);}
    .header-logo-img{height:20px;width:auto;opacity:0.88;}
    .hdr-right{display:flex;align-items:center;gap:6px;}
    .icon-btn{background:rgba(255,255,255,0.14);border:1px solid var(--border);cursor:pointer;padding:7px;border-radius:9px;color:var(--muted);display:flex;align-items:center;transition:color 0.15s,background 0.15s;}
    .icon-btn:active{background:rgba(255,255,255,0.1);color:#fff;}
    .icon-btn svg{width:17px;height:17px;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .spinning{animation:spin 1s linear infinite;}
    .sign-out-btn{font-size:13px;color:var(--muted);background:rgba(255,255,255,0.12);border:1px solid var(--border);cursor:pointer;padding:6px 12px;border-radius:20px;font-family:var(--font);font-weight:600;transition:all 0.15s;}
    .sign-out-btn:active{color:#fff;background:rgba(255,255,255,0.1);}

    /* ── Hero profile strip ── */
    .hero-profile{
      background:var(--surface);
      border-bottom:1px solid var(--border);
      padding:16px 18px 16px;
    }
    .hero-rings-block{
      background:var(--surface);
      border-bottom:1px solid var(--border);
      padding:16px 18px 18px;
    }
    .hero-metrics-block{
      background:var(--surface2);
      border-bottom:1px solid var(--border);
      padding:14px 18px;
    }
    .hero-top{display:flex;align-items:center;gap:12px;}
    .avatar{
      width:46px;height:46px;border-radius:50%;
      background:var(--brand);color:#fff;
      display:flex;align-items:center;justify-content:center;
      font-size:18px;font-weight:800;flex-shrink:0;
      border:2px solid rgba(232,98,42,0.4);
    }
    .hero-info{flex:1;min-width:0;}
    .hero-name{font-size:18px;font-weight:800;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .hero-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px;}
    .hero-tag{background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.95);font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;letter-spacing:0.2px;}

    /* ── Medal rings row ── */
    .rings-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
    .ring-box{display:flex;flex-direction:column;align-items:center;gap:0;}
    .ring-svg-wrap{position:relative;width:100px;height:100px;flex-shrink:0;}
    .ring-svg-wrap svg{width:100px;height:100px;transform:rotate(-90deg);}
    .ring-bg{fill:none;stroke:rgba(255,255,255,0.20);stroke-width:9;}
    .ring-fill{fill:none;stroke-width:9;stroke-linecap:round;transition:stroke-dashoffset 0.8s ease;}
    .ring-fill.br{stroke:#F4A84A;}
    .ring-fill.si{stroke:#C8D8E8;}
    .ring-fill.go{stroke:#FFD000;}
    .ring-inner{
      position:absolute;inset:0;display:flex;flex-direction:column;
      align-items:center;justify-content:center;
    }
    .ring-pct{font-size:24px;font-weight:700;color:#fff;line-height:1;letter-spacing:-0.5px;}
    .ring-check{font-size:22px;line-height:1;}
    .ring-emoji{font-size:20px;margin-bottom:3px;}
    .ring-name{font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;margin-top:6px;}
    .ring-name.br{color:#F4A84A;} .ring-name.si{color:#C8D8E8;} .ring-name.go{color:#FFD000;}
    .ring-need{font-size:13px;font-weight:600;color:var(--label);margin-top:3px;text-align:center;line-height:1.3;}
    .ring-need.done{color:var(--green);}

    /* ── Big metric trio ── */
    .metric-trio{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
    .metric-box{
      background:var(--surface2);border:1px solid var(--border);
      border-radius:var(--radius-sm);
      padding:14px 10px;text-align:center;
    }
    .metric-val{font-size:30px;font-weight:600;line-height:1;letter-spacing:-0.3px;}
    .metric-val.orange{color:var(--brand);}
    .metric-val.green{color:var(--green);}
    .metric-val.blue{color:var(--blue);}
    .metric-lbl{font-size:9.5px;font-weight:700;color:var(--label);text-transform:uppercase;letter-spacing:0.8px;margin-top:5px;}

    /* ── Content area ── */
    .content{flex:1;padding:14px 14px 90px;display:none;}
    .content.active{display:block;}
    .max-w{max-width:540px;margin:0 auto;}

    /* ── Section label ── */
    .sec{font-size:12px;font-weight:700;color:var(--label);text-transform:uppercase;letter-spacing:1px;margin:18px 0 8px;}
    .sec:first-child{margin-top:4px;}

    /* ── Card ── */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:8px;}

    /* ── List row ── */
    .lrow{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--border);}
    .lrow:last-child{border-bottom:none;}
    .lrow-left{flex:1;}
    .lrow-label{font-size:15px;font-weight:600;color:var(--text);}
    .lrow-sub{font-size:12px;color:var(--label);margin-top:2px;}
    .lrow-val{font-size:20px;font-weight:800;color:var(--brand);flex-shrink:0;}

    /* ── WHOOP-style activity tile rows ── */
    #act-list{display:grid;gap:8px;}
    .date-group{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
    .date-row{display:flex;align-items:center;padding:12px 14px;cursor:pointer;gap:10px;user-select:none;}
    .date-row:active{background:var(--surface2);}
    .date-col{flex:1;}
    .date-label{font-size:15px;font-weight:700;color:#fff;}
    .date-sub{font-size:12px;color:var(--label);margin-top:2px;}
    .date-pts-strip{display:flex;gap:4px;align-items:center;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;}
    .dpill{font-size:11px;font-weight:700;padding:3px 7px;border-radius:7px;white-space:nowrap;}
    .dpill.dist{background:rgba(96,165,250,0.15);color:#60A5FA;}
    .dpill.bonus{background:rgba(255,208,0,0.15);color:#FFD000;}
    .dpill.chall{background:rgba(34,197,94,0.15);color:#22C55E;}
    .dpill.total{background:var(--brand);color:#fff;}
    .date-chevron{font-size:12px;color:var(--label);transition:transform 0.2s;flex-shrink:0;}
    .date-group.open .date-chevron{transform:rotate(180deg);}
    .acts-inner{display:none;border-top:1px solid var(--border);}
    .date-group.open .acts-inner{display:block;}

    /* ── WHOOP-style act tile ── */
    .act-tile{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid var(--border);}
    .act-tile:last-child{border-bottom:none;}
    .act-tile-icon{
      width:44px;height:44px;border-radius:12px;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;
      font-size:16px;font-weight:900;color:#fff;
    }
    .act-tile-icon.walk{background:#166534;}
    .act-tile-icon.run{background:#1d4ed8;}
    .act-tile-icon.ride{background:#92400e;}
    .act-tile-icon.hike{background:#5b21b6;}
    .act-tile-icon.other{background:#374151;}
    .act-tile-body{flex:1;min-width:0;}
    .act-tile-sport{font-size:13px;font-weight:700;color:var(--label);text-transform:uppercase;letter-spacing:0.5px;}
    .act-tile-name{font-size:15px;font-weight:700;color:#fff;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .act-tile-meta{font-size:12px;color:var(--muted);margin-top:3px;}
    .act-tile-right{text-align:right;flex-shrink:0;}
    .act-tile-dist{font-size:22px;font-weight:900;color:#fff;line-height:1;letter-spacing:-0.3px;}
    .act-tile-dist-lbl{font-size:11px;font-weight:600;color:var(--label);margin-top:1px;}
    .act-tile-flag{font-size:8.5px;font-weight:700;padding:2px 6px;border-radius:5px;margin-top:3px;display:inline-block;}
    .flag-valid{background:rgba(34,197,94,0.15);color:#22C55E;}
    .flag-bad{background:rgba(239,68,68,0.15);color:#EF4444;}

    /* ── Medal progress ── */
    .medal-header-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 12px;border-bottom:1px solid var(--border);}
    .medal-current-block{display:flex;align-items:center;gap:10px;}
    .medal-emoji-big{font-size:30px;line-height:1;}
    .medal-current-info{}
    .medal-current-lbl{font-size:9.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;}
    .medal-current-name{font-size:18px;font-weight:900;color:var(--text);}
    .medal-pts-right{text-align:right;}
    .medal-pts-big{font-size:28px;font-weight:900;color:var(--brand);line-height:1;letter-spacing:-0.5px;}
    .medal-pts-lbl{font-size:9.5px;font-weight:600;color:var(--muted);margin-top:3px;}

    .medal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px 14px 14px;}
    .medal-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-xs);padding:10px 6px 12px;text-align:center;position:relative;}
    .medal-item.achieved{border-color:var(--brand);}
    .mc-emoji{font-size:24px;margin-bottom:4px;}
    .mc-name{font-size:12px;font-weight:800;margin-bottom:5px;}
    .mc-name.br{color:var(--bronze);} .mc-name.si{color:var(--silver);} .mc-name.go{color:var(--gold);}
    .mc-pct{font-size:20px;font-weight:900;color:#fff;line-height:1;margin-bottom:2px;}
    .mc-pts-lbl{font-size:8.5px;color:var(--muted);margin-bottom:6px;}
    .mc-bar{background:rgba(255,255,255,0.12);border-radius:20px;height:4px;overflow:hidden;margin:0 4px;}
    .mc-fill{height:100%;border-radius:20px;transition:width 0.6s ease;}
    .mc-fill.br{background:var(--bronze);} .mc-fill.si{background:var(--silver);} .mc-fill.go{background:var(--gold);}
    .mc-need{font-size:10px;color:var(--muted);margin-top:5px;line-height:1.4;}
    .mc-done{position:absolute;top:4px;right:4px;font-size:7px;font-weight:700;background:var(--brand);color:#fff;padding:1px 5px;border-radius:5px;}

    /* ── Standing ── */
    .standing-row{display:flex;align-items:center;gap:0;border-bottom:1px solid var(--border);}
    .standing-row:last-child{border-bottom:none;}
    .standing-rank-col{
      display:flex;align-items:center;justify-content:flex-start;
      padding:14px 12px 14px 16px;
      flex-shrink:0;width:90px;
    }
    .standing-rank-big{font-size:28px;font-weight:900;color:var(--brand);line-height:1;white-space:nowrap;}
    .standing-info{flex:1;min-width:0;padding:14px 14px;border-left:1px solid var(--border);}
    .standing-cat{font-size:15px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .standing-sub{font-size:12px;color:var(--muted);margin-top:2px;}

    /* ── Pace goals ── */
    .pace-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);}
    .pace-row:last-child{border-bottom:none;}
    .pace-icon{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
    .pace-text{flex:1;}
    .pace-main{font-size:14px;font-weight:700;color:#fff;}
    .pace-sub{font-size:9.5px;color:var(--muted);margin-top:2px;}
    .pace-val{font-size:18px;font-weight:900;flex-shrink:0;text-align:right;min-width:44px;}

    /* ── Gold achieved card ── */
    .gold-card{padding:16px;}
    .gold-top{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
    .gold-emoji{font-size:34px;line-height:1;}
    .gold-title{font-size:18px;font-weight:900;color:var(--gold);}
    .gold-sub{font-size:12px;color:var(--muted);margin-top:2px;}
    .gold-quote{
      background:linear-gradient(135deg,rgba(232,98,42,0.15),rgba(245,158,11,0.10));
      border:1px solid rgba(232,98,42,0.25);
      border-left:3px solid var(--brand);
      border-radius:var(--radius-xs);
      padding:12px 14px;
      margin-bottom:12px;
    }
    .gold-quote-text{font-size:16px;font-weight:800;color:#fff;line-height:1.4;font-style:italic;}
    .gold-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
    .gold-stat{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-xs);padding:10px 12px;}
    .gold-stat-val{font-size:20px;font-weight:900;color:var(--brand);line-height:1;}
    .gold-stat-lbl{font-size:11px;font-weight:600;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:0.5px;}
    .gold-rival{display:flex;align-items:center;justify-content:space-between;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-xs);padding:10px 12px;}
    .gold-rival-left{flex:1;}
    .gold-rival-label{font-size:13px;font-weight:700;color:#fff;}
    .gold-rival-sub{font-size:9.5px;color:var(--muted);margin-top:2px;}
    .gold-rival-pts{font-size:18px;font-weight:900;color:var(--green);flex-shrink:0;}

    /* ── Streak ── */
    .streak-top{display:flex;align-items:flex-end;justify-content:space-between;padding:14px 16px 10px;}
    .streak-num{font-size:54px;font-weight:900;color:var(--brand);line-height:1;letter-spacing:-2px;}
    .streak-num-lbl{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:8px;}
    .streak-right{text-align:right;}
    .streak-best-val{font-size:20px;font-weight:800;color:#fff;}
    .streak-best-lbl{font-size:9.5px;color:var(--muted);margin-top:2px;}
    .streak-msg-txt{font-size:13px;color:var(--muted);margin-top:4px;}
    .streak-bars-wrap{padding:4px 16px 6px;display:flex;gap:4px;}
    .sbar{flex:1;height:8px;border-radius:4px;}
    .sbar.on{background:var(--brand);}
    .sbar.dim{background:rgba(232,98,42,0.25);}
    .sbar.off{background:rgba(255,255,255,0.12);}
    .streak-day-labels{display:flex;justify-content:space-between;padding:0 16px 12px;}
    .sdlbl{font-size:8.5px;color:var(--muted);text-align:center;flex:1;}

    /* ── Time of day ── */
    .tod-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
    .tod-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 6px;text-align:center;}
    .tod-icon{font-size:22px;margin-bottom:4px;}
    .tod-val{font-size:24px;font-weight:900;color:var(--brand);line-height:1;}
    .tod-lbl{font-size:11px;font-weight:600;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:0.4px;}

    /* ── Rivals ── */
    .rival-row{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--border);}
    .rival-row:last-child{border-bottom:none;}
    .rival-row.rival-me{background:rgba(232,98,42,0.06);}
    .rival-badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;flex-shrink:0;min-width:36px;text-align:center;}
    .rb-ahead{background:rgba(239,68,68,0.15);color:#EF4444;}
    .rb-you{background:var(--brand);color:#fff;}
    .rb-behind{background:rgba(34,197,94,0.15);color:#22C55E;}
    .rival-name{flex:1;font-size:12.5px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .rival-gap{font-size:13px;font-weight:700;flex-shrink:0;}
    .gap-up{color:#EF4444;} .gap-dn{color:#22C55E;} .gap-me{color:var(--brand);}

    /* ── Challenges ── */
    .ch-row{display:flex;align-items:flex-start;gap:10px;padding:11px 16px;border-bottom:1px solid var(--border);}
    .ch-row:last-child{border-bottom:none;}
    .ch-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:1px;font-weight:700;}
    .ch-dot.won{background:rgba(34,197,94,0.2);color:#22C55E;}
    .ch-dot.avail{background:rgba(255,208,0,0.2);color:#FFD000;}
    .ch-dot.missed{background:rgba(255,255,255,0.14);color:var(--muted);}
    .ch-body{flex:1;min-width:0;}
    .ch-title{font-size:14px;font-weight:700;color:#fff;}
    .ch-sub{font-size:9.5px;color:var(--muted);margin-top:2px;}
    .ch-pts{font-size:14px;font-weight:800;flex-shrink:0;}
    .ch-pts.won{color:#22C55E;} .ch-pts.avail{color:#FFD000;} .ch-pts.missed{color:var(--muted);}

    /* ── Flagged banner ── */
    .flagged-info{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:10px;font-size:11.5px;color:#FCA5A5;line-height:1.6;display:none;}

    /* ── Skeleton ── */
    @keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
    .skeleton{background:linear-gradient(90deg,#1C2030 25%,#252A3A 50%,#1C2030 75%);background-size:800px 100%;animation:shimmer 1.6s ease infinite;border-radius:8px;}
    .skel-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:8px;}
    .skel-line{height:13px;margin-bottom:8px;}
    .skel-line.short{width:40%;} .skel-line.medium{width:65%;} .skel-line.full{width:100%;}

    .empty-state{text-align:center;padding:36px 20px;color:var(--muted);}
    .empty-state .icon{font-size:38px;margin-bottom:10px;display:block;opacity:0.4;}
    .empty-state p{font-size:15px;line-height:1.6;}

    /* ── Bottom nav ── */
    .bottom-nav{
      position:fixed;bottom:0;left:0;right:0;
      background:var(--surface);
      border-top:1px solid var(--border);
      display:grid;grid-template-columns:1fr 1fr 1fr;
      padding-bottom:max(14px,env(safe-area-inset-bottom));
      z-index:200;
    }
    .bnav-item{
      display:flex;flex-direction:column;align-items:center;
      padding:12px 6px 4px;text-decoration:none;
      color:var(--muted);font-size:9.5px;font-weight:700;
      letter-spacing:0.5px;text-transform:uppercase;gap:5px;
      transition:color 0.15s;position:relative;
    }
    .bnav-item svg{width:22px;height:22px;stroke-width:2;}
    .bnav-item.active{color:var(--brand);}
    .bnav-item.active::after{
      content:'';position:absolute;bottom:calc(max(14px,env(safe-area-inset-bottom)) + 100% - 4px);
      left:50%;transform:translateX(-50%);
      width:24px;height:3px;background:var(--brand);border-radius:0 0 3px 3px;
    }

    .points,.distance,.rank,td,th{font-variant-numeric:tabular-nums;}
  </style>
